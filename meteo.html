<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Météo — TLB</title>
  <meta name="description" content="Météo France · modèle AROME haute résolution · via Open-Meteo">
  <meta name="theme-color" content="#F5F0E8">

  <meta property="og:description" content="Prévisions AROME · Météo France · via Open-Meteo">

  <meta name="twitter:title" content="Météo — TLB">
  <meta name="twitter:description" content="Prévisions AROME · Météo France · via Open-Meteo">
  <meta name="twitter:image" content="https://teivano.fr/og-image.png">
  <link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Georgia,serif' font-size='52' fill='%236B1A1A' text-anchor='middle'%3ETLB%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { overflow-x: hidden; }

    /* ── Page wrapper mobile-first ── */
    .meteo-page {
      position: relative; z-index: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 4.5rem 1.4rem 6rem;
      animation: tlbFadeUp .8s cubic-bezier(.16,1,.3,1) .25s both;
    }

    /* ── Vigilance banner ── */
    [hidden] { display: none !important; }
    .vigi {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid currentColor;
      border-radius: 2px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 400;
    }
    .vigi-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(0,0,0,.04);
    }
    .vigi-text { line-height: 1.4; }
    .vigi-text b { font-weight: 500; letter-spacing: .12em; }
    .vigi-text small {
      display: block;
      text-transform: none;
      letter-spacing: .04em;
      opacity: .65;
      font-size: .62rem;
      margin-top: .2rem;
    }
    .vigi.level-1 { color: #B8930C; background: rgba(255, 215, 0, .08); }
    .vigi.level-2 { color: #C25A1E; background: rgba(255, 140, 0, .08); }
    .vigi.level-3 { color: #B72424; background: rgba(220, 20, 20, .08); }

    /* ── Ville (header) ── */
    .city-row {
      display: flex; align-items: baseline; gap: .55rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
      position: relative;
    }
    .city-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 9vw, 3.6rem);
      font-weight: 300;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
    }
    .city-edit {
      background: none; border: none;
      cursor: pointer;
      padding: .35rem;
      color: var(--ink2);
      transition: color .2s, transform .2s;
      display: inline-flex;
      align-items: center;
    }
    .city-edit:hover { color: var(--ink); transform: rotate(-8deg); }
    .city-edit svg { width: 16px; height: 16px; }

    .city-input-wrap {
      width: 100%;
      margin-top: .6rem;
      position: relative;
    }
    .city-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink2);
      padding: .5rem 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 300;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    .city-input:focus { border-bottom-color: var(--ink); }
    .city-input::placeholder { color: var(--ink2); font-style: italic; }

    .city-suggestions {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: var(--bg);
      border: 1px solid var(--ink2);
      border-top: none;
      max-height: 280px;
      overflow-y: auto;
      z-index: 20;
    }
    .city-sugg-item {
      padding: .7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--ink2);
      font-family: 'Space Grotesk', sans-serif;
      font-size: .8rem;
      transition: background .15s;
    }
    .city-sugg-item:last-child { border-bottom: none; }
    .city-sugg-item:hover { background: var(--ink2); color: var(--bg); }
    .city-sugg-item small {
      display: block;
      opacity: .55;
      font-size: .65rem;
      margin-top: .15rem;
      letter-spacing: .03em;
    }
    .city-sugg-empty {
      padding: 1rem;
      font-size: .75rem;
      color: var(--ink2);
      text-align: center;
      font-style: italic;
    }

    /* ── Card générique (fond blanc) ── */
    .card {
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 6px;
      padding: 1.4rem 1.3rem;
      margin-bottom: 1.1rem;
      box-shadow: 0 1px 0 rgba(0,0,0,.02), 0 8px 24px -16px rgba(0,0,0,.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Current weather (vue-vedette) ── */
    .current {
      padding-top: 1.2rem;
      padding-bottom: 1.8rem;
      position: relative;
    }
    /* Bouton chevron pour expand/collapse les détails */
    .current-toggle {
      position: absolute;
      bottom: .35rem;
      right: .55rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: .45rem;
      color: var(--ink2);
      transition: color .2s;
      line-height: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .current-toggle:hover { color: var(--ink); }
    .current-toggle svg {
      width: 14px;
      height: 14px;
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }
    .current.expanded .current-toggle svg { transform: rotate(180deg); }
    /* Détails masqués par défaut, animation via grid-template-rows */
    .current-details {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .4s cubic-bezier(.16,1,.3,1);
    }
    .current-details-inner { overflow: hidden; }
    .current.expanded .current-details { grid-template-rows: 1fr; }
    .current-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .current-temp-wrap { flex: 1 1 auto; min-width: 0; }
    .current-date {
      flex: 0 0 auto;
      text-align: right;
      padding-top: .35rem;
    }
    .current-date-day {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.25rem;
      color: var(--ink);
      text-transform: capitalize;
      line-height: 1.1;
    }
    .current-date-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-top: .25rem;
      font-weight: 500;
    }
    /* Éphéméride (lever / coucher / durée du jour) */
    .current-ephem {
      display: flex;
      flex-wrap: wrap;
      gap: 1.1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0,0,0,.06);
      font-family: 'Space Grotesk', sans-serif;
      font-size: .68rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink2);
      align-items: center;
    }
    .current-ephem-item { display: inline-flex; align-items: center; gap: .35rem; }
    .current-ephem .arrow { font-size: .82rem; line-height: 1; color: var(--ink2); }
    .current-ephem b {
      font-weight: 500;
      color: var(--ink);
      letter-spacing: .02em;
      text-transform: none;
      font-size: .78rem;
    }
    .current-ephem[hidden] { display: none; }
    .current-temp {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(4.2rem, 19vw, 6.8rem);
      font-weight: 300;
      letter-spacing: -.04em;
      line-height: .9;
      display: inline-block;
    }
    .current-temp sup {
      font-size: .35em;
      font-weight: 300;
      vertical-align: baseline;
      position: relative;
      top: -.95em;
      margin-left: .04em;
      opacity: .55;
    }
    .current-desc {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: var(--ink);
      margin-top: .4rem;
    }
    .current-meta {
      display: flex; flex-wrap: wrap; gap: 1.2rem;
      margin-top: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink2);
    }
    .current-meta b { font-weight: 500; color: var(--ink); letter-spacing: .04em; text-transform: none; font-size: .82rem; }

    /* ── Bandeau pluie aujourd'hui (NEW) ── */
    .rain-today {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.1rem;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 6px;
      box-shadow: 0 1px 0 rgba(0,0,0,.02), 0 8px 24px -16px rgba(0,0,0,.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .rain-today.wet { background: linear-gradient(135deg, rgba(180,210,240,.55), rgba(255,255,255,.85)); }
    .rain-today-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      color: var(--ink);
      line-height: 0;
    }
    .rain-today-icon svg { width: 100%; height: 100%; display: block; }
    .rain-today-icon.wet { color: #2a5e94; }
    .rain-today-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.3;
      color: var(--ink);
    }
    .rain-today-text b { font-weight: 500; font-style: italic; }
    /* Tous les chiffres de la prévision pluie en Space Grotesk (heures, mm, %) */
    .rain-today-text .num {
      font-family: 'Space Grotesk', sans-serif;
      font-style: normal;
      font-weight: 500;
      letter-spacing: .01em;
    }
    .rain-today-text small {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-top: .25rem;
    }

    /* ── Nowcasting pluie (court terme, 1h) ── */
    .nowcast {
      padding: .8rem 1.1rem;
      margin-bottom: 1.1rem;
      background: var(--ink);
      color: var(--bg);
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .72rem;
      letter-spacing: .04em;
      line-height: 1.45;
    }
    .nowcast b { font-weight: 500; }

    /* ── Toggle horizon ── */
    .toggle {
      display: inline-flex;
      gap: 0;
      margin-bottom: 1.4rem;
      border: 1px solid var(--ink2);
      border-radius: 2px;
      overflow: hidden;
    }
    .toggle-btn {
      background: rgba(255,255,255,.82);
      border: none;
      padding: .55rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .68rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink2);
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .toggle-btn:not(:last-child) { border-right: 1px solid var(--ink2); }
    .toggle-btn.active {
      background: var(--ink);
      color: var(--bg);
    }

    /* ── Vue horaire (défaut) ── */
    .view { animation: tlbFadeUp .5s cubic-bezier(.16,1,.3,1) both; }
    .view[hidden] { display: none; }

    .hourly-graph {
      width: 100%;
      margin: .5rem 0 1.4rem;
      display: flex;
      align-items: stretch;
    }
    .hourly-y-axis {
      flex: 0 0 34px;
      position: relative;
      height: 200px;
    }
    .hourly-y-axis span {
      position: absolute;
      right: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .68rem;
      color: var(--ink2);
      transform: translateY(-50%);
      white-space: nowrap;
      letter-spacing: -.01em;
    }
    .hourly-svg-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
      cursor: crosshair;
      touch-action: pan-y;
    }
    .hourly-svg-wrap svg {
      width: 100%;
      height: 200px;
      display: block;
      overflow: visible;
    }
    .hourly-x-axis {
      position: relative;
      height: 26px;
      margin-top: 2px;
    }
    .hourly-x-axis span {
      position: absolute;
      top: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .68rem;
      color: var(--ink2);
      letter-spacing: .04em;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .hourly-x-axis span.day {
      font-weight: 500;
      color: var(--ink);
      letter-spacing: .08em;
    }
    .grid-line {
      stroke: var(--ink2);
      stroke-width: .5;
      stroke-dasharray: 2 3;
      opacity: .35;
    }
    .temp-path {
      fill: none;
      stroke: var(--ink);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .temp-area {
      fill: var(--ink);
      opacity: .07;
    }
    .precip-bar {
      fill: #3a7ab8;
      opacity: .45;
    }
    .now-dot {
      fill: var(--ink);
      stroke: var(--bg);
      stroke-width: 2;
    }
    .day-sep {
      stroke: var(--ink);
      stroke-width: 1.2;
      stroke-dasharray: 4 4;
      opacity: .75;
    }
    /* Badge "DEMAIN" / "SAMEDI" centré sur le séparateur de jour */
    .day-badge {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg);
      border: 1px solid var(--ink);
      padding: .3rem .6rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .58rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 2;
    }
    /* Scrubber overlay (touch/drag pour scruter la courbe) */
    .scrubber {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--ink);
      opacity: .55;
      pointer-events: none;
      transform: translateX(-50%);
      transition: opacity .15s;
    }
    .scrubber[hidden] { display: none; }
    .scrubber-dot {
      position: absolute;
      top: 0;
      left: 50%;
      width: 9px; height: 9px;
      transform: translate(-50%, -50%);
      background: var(--ink);
      border: 2px solid var(--bg);
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--ink);
    }
    .scrubber-bubble {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translate(-50%, -100%);
      background: var(--ink);
      color: var(--bg);
      padding: .35rem .55rem;
      border-radius: 4px;
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .68rem;
      letter-spacing: .04em;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: .35rem;
      box-shadow: 0 4px 12px -4px rgba(0,0,0,.3);
    }
    .scrubber-bubble::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 6px; height: 6px;
      background: var(--ink);
    }
    .scrubber-bubble .icon { font-size: .9rem; line-height: 1; }
    .scrubber-bubble .temp { font-weight: 500; font-size: .78rem; }

    .hourly-scroll {
      display: flex;
      gap: .4rem;
      overflow-x: auto;
      overflow-y: hidden;
      padding: .25rem .1rem 1rem;
      margin: 0 -1.3rem;
      padding-left: 1.3rem;
      padding-right: 1.3rem;
      scrollbar-width: thin;
      scrollbar-color: var(--ink2) transparent;
      -webkit-overflow-scrolling: touch;
    }
    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: var(--ink2); border-radius: 2px; }

    .hour-card {
      flex: 0 0 auto;
      min-width: 68px;
      padding: .7rem .55rem .6rem;
      border: 1px solid var(--ink2);
      border-radius: 4px;
      text-align: center;
      background: rgba(255,255,255,.5);
      transition: border-color .2s, background .2s, transform .15s;
      cursor: pointer;
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .hour-card:hover, .hour-card:focus-visible {
      border-color: var(--ink);
      outline: none;
    }
    .hour-card:active { transform: scale(.97); }
    .hour-card.now {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--bg);
    }
    .hour-card.now .hour-time,
    .hour-card.now .hour-temp,
    .hour-card.now .hour-icon { color: var(--bg); }
    .hour-card.now .hour-precip-mm { color: var(--bg); }
    .hour-card.now .hour-precip-bar-fill { background: var(--bg); opacity: .85; }
    .hour-card.has-rain { background: linear-gradient(180deg, rgba(255,255,255,.6), rgba(170,200,235,.45)); }
    .hour-card.has-rain.now { background: var(--ink); }
    .hour-card.selected {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px var(--ink) inset;
    }

    .hour-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: .35rem;
    }
    .hour-icon {
      font-size: 1.05rem;
      line-height: 1;
      margin: .15rem 0 .3rem;
      color: var(--ink);
    }
    .hour-temp {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
    }
    /* Mini-barre verticale pluie (remplace le tiret) */
    .hour-precip-bar {
      margin: .45rem auto 0;
      width: 28px;
      height: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }
    .hour-precip-bar-fill {
      width: 6px;
      background: #3a7ab8;
      border-radius: 1px;
      transition: height .3s;
    }
    .hour-precip-mm {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .55rem;
      letter-spacing: .02em;
      color: #2a5e94;
      margin-top: .15rem;
      line-height: 1;
      font-weight: 500;
    }
    .hour-day-sep {
      flex: 0 0 auto;
      align-self: center;
      padding: .35rem .55rem;
      margin: 0 .25rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .58rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink2);
      border: 1px dashed var(--ink2);
      border-radius: 3px;
      white-space: nowrap;
      background: rgba(255,255,255,.4);
    }

    /* ── Hour detail panel (slide-down sous les cards) ── */
    .hour-detail {
      margin: .8rem 0 0;
      padding: 1rem 1.2rem;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--ink2);
      border-radius: 4px;
      animation: tlbFadeUp .3s cubic-bezier(.16,1,.3,1) both;
    }
    .hour-detail[hidden] { display: none; }
    .hour-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: .8rem;
    }
    .hour-detail-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: .02em;
      line-height: 1.1;
      color: var(--ink);
    }
    .hour-detail-time small {
      display: block;
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink2);
      font-weight: 400;
      margin-bottom: .25rem;
    }
    .hour-detail-temp {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 300;

  <!-- ── Météo : core logic ────────────────────────────────── -->
  <script>
  (function(){

    var CACHE_TTL_MS = 15 * 60 * 1000; // 15 min
    var GEO_TIMEOUT_MS = 1500;

      hourlyScroll: $('hourlyScroll'),

      scrubberDot: $('scrubberDot'),
      scrubTime: $('scrubTime'),
      scrubTemp: $('scrubTemp'),
      scrubIcon: $('scrubIcon'),
      dailyList: $('dailyList'),
      sourceModel: $('sourceModel'),
      sourceUpdated: $('sourceUpdated'),
      shareBtn: $('shareBtn'),
    };

    /* ───── State ───── */
    var state = {
      loc: null,
      data: null,    // AROME (live → 48h)
      dataLong: null,// ARPEGE-européen-via-MF (48h → 7j)
      view: 'hourly',

    };

    /* ───── WMO weather code → libellé FR + glyphe ───── */
    var WMO = {
      0:  ['ciel clair',           '☀️'],
      1:  ['peu nuageux',          '\u{1F324}️'],
      2:  ['partiellement nuageux','⛅'],
      3:  ['couvert',              '☁️'],
      45: ['brouillard',           '\u{1F32B}️'],
      48: ['brouillard givrant',   '\u{1F32B}️'],
      51: ['bruine faible',        '\u{1F326}️'],
      53: ['bruine',               '\u{1F326}️'],
      55: ['bruine forte',         '\u{1F326}️'],
      56: ['bruine verglaçante',   '\u{1F327}️'],
      57: ['bruine verglaçante',   '\u{1F327}️'],
      61: ['pluie faible',         '\u{1F326}️'],
      63: ['pluie',                '\u{1F327}️'],
      65: ['pluie forte',          '\u{1F327}️'],
      66: ['pluie verglaçante',    '\u{1F327}️'],
      67: ['pluie verglaçante',    '\u{1F327}️'],
      71: ['neige faible',         '\u{1F328}️'],
      73: ['neige',                '\u{1F328}️'],
      75: ['neige forte',          '❄️'],
      77: ['grésil',               '\u{1F328}️'],
      80: ['averses',              '\u{1F326}️'],
      81: ['averses',              '\u{1F327}️'],
      82: ['averses fortes',       '⛈️'],
      85: ['averses de neige',     '\u{1F328}️'],
      86: ['averses de neige',     '\u{1F328}️'],
      95: ['orage',                '⛈️'],
      96: ['orage + grêle',        '⛈️'],
      99: ['orage violent',        '⛈️'],
    };
    function wmoLabel(c){ return (WMO[c] || ['—', '·'])[0]; }
    function wmoIcon (c){ return (WMO[c] || ['—', '·'])[1]; }

    /* ───── Direction du vent (° → texte) ───── */
    function windDir(deg){
      if (deg == null || isNaN(deg)) return '';
      var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
      return dirs[Math.round(deg / 22.5) % 16];

    /* ───── Cache localStorage ───── */
    function cacheKey(lat, lon, kind){ return 'meteo_' + kind + '_' + lat.toFixed(3) + '_' + lon.toFixed(3); }
    function cacheGet(key){
      try {
        var raw = localStorage.getItem(key); if (!raw) return null;
        var o = JSON.parse(raw);
        if (Date.now() - o.t > CACHE_TTL_MS) { localStorage.removeItem(key); return null; }
        return o.v;
      } catch(e){ return null; }
    }
    function cacheSet(key, val){
      try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), v: val })); } catch(e){}
    }

    /* ───── Géoloc en cascade : URL → navigator → IP → Rennes ───── */
    function getInitialLoc(){
      // 1. URL params (priorité absolue, pour le partage)
      var p = new URLSearchParams(window.location.search);
      if (p.get('lat') && p.get('lon')) {
        return Promise.resolve({
          lat: parseFloat(p.get('lat')),
          lon: parseFloat(p.get('lon')),
          name: p.get('city') || 'Lieu partagé',
          country: '',
          admin: '',
          dept: p.get('dept') || null
        });
      }

      // 2. Géoloc navigateur (avec timeout pour pas bloquer)
      var navGeo = new Promise(function(resolve){
        if (!navigator.geolocation) return resolve(null);
        var done = false;
        var to = setTimeout(function(){ if(!done){ done = true; resolve(null); } }, GEO_TIMEOUT_MS);
        navigator.geolocation.getCurrentPosition(
          function(pos){ if(!done){ done = true; clearTimeout(to); resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }); } },
          function(){ if(!done){ done = true; clearTimeout(to); resolve(null); } },
          { timeout: GEO_TIMEOUT_MS, enableHighAccuracy: false, maximumAge: 60*60*1000 }

        if (navPos) return reverseGeocode(navPos.lat, navPos.lon).then(function(loc){ return loc || Object.assign({ name: 'Position actuelle' }, navPos); });

      }).then(function(j){
        if (!j || !j.latitude || !j.longitude) return null;
        return {
          lat: j.latitude,
          lon: j.longitude,
          name: j.city || 'Position IP',
          country: j.country_name || '',
          admin: j.region || '',
          dept: null
        };
      }).catch(function(){ return null; });
    }

    /* ───── Reverse geocoding (Open-Meteo) ───── */
    function reverseGeocode(lat, lon){
      // Open-Meteo n'a pas de reverse-geocoding officiel ; on utilise BAN pour FR.
      return fetch('https://api-adresse.data.gouv.fr/reverse/?lat=' + lat + '&lon=' + lon + '&limit=1')
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          if (!j || !j.features || !j.features.length) return null;
          var p = j.features[0].properties;
          return {
            lat: lat, lon: lon,
            name: p.city || p.name || 'Position actuelle',
            country: 'France',
            admin: p.context || '',
            dept: (p.citycode || '').slice(0,2) || null
          };
        }).catch(function(){ return null; });
    }

    /* ───── Forward geocoding (autocomplete ville) ───── */
    var searchTimer = null;
    function searchCities(q){
      if (!q || q.length < 2) { els.citySuggestions.hidden = true; return; }
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function(){
        fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(q) + '&count=6&language=fr&format=json')
          .then(function(r){ return r.json(); })
          .then(function(j){
            var results = (j && j.results) || [];
            renderSuggestions(results);
          })
          .catch(function(){ renderSuggestions([]); });
      }, 220);
    }

    function renderSuggestions(results){
      els.citySuggestions.innerHTML = '';
      if (!results.length) {
        els.citySuggestions.innerHTML = '<div class="city-sugg-empty">aucun résultat</div>';
        els.citySuggestions.hidden = false;
        return;
      }
      results.forEach(function(r){
        var div = document.createElement('div');
        div.className = 'city-sugg-item';
        div.innerHTML = '<div>' + escapeHtml(r.name) + '</div>' +
                        '<small>' + escapeHtml([r.admin1, r.country].filter(Boolean).join(' · ')) + '</small>';
        div.addEventListener('click', function(){
          setLocation({
            lat: r.latitude, lon: r.longitude,

            country: r.country || '',
            admin: r.admin1 || '',
            dept: null
          });
          closeCitySearch();

        els.citySuggestions.appendChild(div);
      });
      els.citySuggestions.hidden = false;

    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }

    /* ───── Open-Meteo : fetch AROME (current+hourly 48h) + ARPEGE (daily 7j) ───── */
    function fetchForecast(lat, lon){
      var cached = cacheGet(cacheKey(lat, lon, 'combined'));
      if (cached) return Promise.resolve(cached);

      // AROME : haute résolution sur France, 48-60h
      var aromeUrl = 'https://api.open-meteo.com/v1/meteofrance'
        + '?latitude=' + lat + '&longitude=' + lon
        + '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,precipitation,is_day,relative_humidity_2m'
        + '&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m'
        + '&minutely_15=precipitation,weather_code'
        + '&models=arome_france&timezone=Europe%2FParis&forecast_days=3&past_days=0';

      // 7 jours : endpoint best_match qui combine ECMWF/GFS/MF — couvre largement 7 jours
      var arpegeUrl = 'https://api.open-meteo.com/v1/forecast'
        + '?latitude=' + lat + '&longitude=' + lon
        + '&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max,sunrise,sunset'
        + '&timezone=Europe%2FParis&forecast_days=7&past_days=0';

      return Promise.all([
        fetch(aromeUrl).then(function(r){ if(!r.ok) throw new Error('arome '+r.status); return r.json(); }),
        fetch(arpegeUrl).then(function(r){ if(!r.ok) throw new Error('arpege '+r.status); return r.json(); }).catch(function(){ return null; })
      ]).then(function(parts){
        var arome = parts[0];
        var arpege = parts[1];
        // Combine : on garde la structure AROME et on injecte daily depuis ARPEGE
        if (arpege && arpege.daily) {
          arome.daily = arpege.daily;
          arome._dailyModel = 'multi-modèles';
        } else {
          arome._dailyModel = 'AROME';
        }
        cacheSet(cacheKey(lat, lon, 'combined'), arome);
        return arome;
      });
    }

    /* ───── Vigilance Météo France (dérivée des seuils Open-Meteo, faute d'API officielle sans clé) ───── */
    function computeVigilance(data){
      if (!data || !data.daily) return null;
      var d = data.daily;
      var todayIdx = 0;
      var tMax = d.temperature_2m_max[todayIdx];
      var tMin = d.temperature_2m_min[todayIdx];
      var precip = d.precipitation_sum[todayIdx];
      var wind = d.wind_speed_10m_max[todayIdx];

      var level = 0; // 0=vert, 1=jaune, 2=orange, 3=rouge
      var reasons = [];

      if (wind >= 100) { level = Math.max(level, 3); reasons.push('vents violents'); }
      else if (wind >= 80) { level = Math.max(level, 2); reasons.push('vent fort'); }
      else if (wind >= 60) { level = Math.max(level, 1); reasons.push('vent soutenu'); }

      if (precip >= 80) { level = Math.max(level, 3); reasons.push('pluies torrentielles'); }
      else if (precip >= 40) { level = Math.max(level, 2); reasons.push('fortes pluies'); }
      else if (precip >= 20) { level = Math.max(level, 1); reasons.push('pluies notables'); }

      if (tMax >= 38) { level = Math.max(level, 3); reasons.push('canicule extrême'); }
      else if (tMax >= 34) { level = Math.max(level, 2); reasons.push('forte chaleur'); }
      else if (tMax >= 30) { level = Math.max(level, 1); reasons.push('chaleur'); }

      if (tMin <= -10) { level = Math.max(level, 3); reasons.push('grand froid'); }
      else if (tMin <= -5) { level = Math.max(level, 2); reasons.push('froid intense'); }
      else if (tMin <= 0)  { level = Math.max(level, 1); reasons.push('gel'); }

      var todayCode = d.weather_code[todayIdx];
      if ([95,96,99].indexOf(todayCode) > -1) { level = Math.max(level, 2); reasons.push('orage'); }
      if ([75,86].indexOf(todayCode) > -1)     { level = Math.max(level, 2); reasons.push('neige importante'); }

      if (level === 0) return null;
      return { level: level, reasons: reasons };
    }

    function renderVigilance(v){
      if (!v) { els.vigi.hidden = true; els.vigi.innerHTML = ''; return; }
      var titles = { 1: 'Vigilance jaune', 2: 'Vigilance orange', 3: 'Vigilance rouge' };
      els.vigi.className = 'vigi level-' + v.level;
      els.vigi.innerHTML =
        '<span class="vigi-dot" aria-hidden="true"></span>' +
        '<span class="vigi-text">' +
          '<b>' + titles[v.level] + '</b> · ' + v.reasons.join(', ') +
          '<small>Indicateur dérivé des prévisions Open-Meteo · non officiel</small>' +
        '</span>';
      els.vigi.hidden = false;
    }

    /* ───── Nowcasting pluie (15 min granularity) ───── */
    function renderNowcast(data){
      if (!data || !data.minutely_15 || !data.minutely_15.precipitation) {
        els.nowcast.hidden = true; return;
      }
      var times = data.minutely_15.time;
      var precs = data.minutely_15.precipitation;
      var now = Date.now();
      var nextHourEnd = now + 60 * 60 * 1000;

      // Fenêtre prochaine heure
      var window = [];
      for (var i = 0; i < times.length; i++) {
        var t = new Date(times[i]).getTime();
        if (t >= now - 8*60*1000 && t <= nextHourEnd) {
          window.push({ t: t, p: precs[i] || 0 });
        }
      }
      if (!window.length) { els.nowcast.hidden = true; return; }

      var total = window.reduce(function(s, x){ return s + x.p; }, 0);
      var firstRainIdx = -1;
      for (var j = 0; j < window.length; j++) { if (window[j].p > 0.05) { firstRainIdx = j; break; } }

      if (total < 0.1) {
        els.nowcast.hidden = true;
        return;
      }

      var msg;
      if (firstRainIdx === -1) {
        els.nowcast.hidden = true; return;
      } else if (firstRainIdx === 0) {
        msg = '<b>Il pleut maintenant.</b> ' + total.toFixed(1) + ' mm attendus sur la prochaine heure.';
      } else {
        var firstT = window[firstRainIdx].t;
        var inMin = Math.max(1, Math.round((firstT - now) / 60000));
        msg = '<b>Pluie dans ' + inMin + ' min.</b> ' + total.toFixed(1) + ' mm attendus sur la prochaine heure.';
      }

      els.nowcast.innerHTML = msg;
      els.nowcast.hidden = false;
    }

    /* ───── Vue "actuel" ───── */
    var FR_DAYS_LONG   = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    var FR_MONTHS_LONG = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

    function renderCurrent(data){

    /* ───── Éphéméride : lever / coucher / durée du jour ───── */
    function renderEphem(data){
      if (!data || !data.daily || !data.daily.sunrise || !data.daily.sunrise[0]) {
        els.currentEphem.hidden = true;
        return;
      }
      var rise = new Date(data.daily.sunrise[0]);
      var set  = new Date(data.daily.sunset[0]);
      function hhmm(d){ return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
      var durMs = set.getTime() - rise.getTime();
      var dh = Math.floor(durMs / 3600000);
      var dm = Math.floor((durMs % 3600000) / 60000);
      var dur = dh + 'h' + String(dm).padStart(2,'0');

      els.currentEphem.innerHTML =
        '<span class="current-ephem-item"><span class="arrow">↑</span> lever <b>' + hhmm(rise) + '</b></span>' +
        '<span class="current-ephem-item"><span class="arrow">↓</span> coucher <b>' + hhmm(set) + '</b></span>' +
        '<span class="current-ephem-item">durée du jour <b>' + dur + '</b></span>';
      els.currentEphem.hidden = false;
    }

    /* ───── Vue horaire : graph SVG + cards scrollables ───── */
    var DAYS_SHORT = ['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
    var DAYS_LONG  = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];

    function renderHourly(data){
      if (!data || !data.hourly) return;
      var h = data.hourly;
      var times = h.time.map(function(t){ return new Date(t); });
      var temps = h.temperature_2m;
      var apps  = h.apparent_temperature || [];
      var precs = h.precipitation;
      var probs = h.precipitation_probability || [];
      var codes = h.weather_code;
      var winds = h.wind_speed_10m || [];
      var windDirs = h.wind_direction_10m || [];
      var hums  = h.relative_humidity_2m || [];

      // Fenêtre : à partir de maintenant (heure pleine en cours) → 48h
      var now = new Date();
      var startIdx = 0;
      for (var i = 0; i < times.length; i++) {
        if (times[i].getTime() >= now.getTime() - 3600*1000) { startIdx = i; break; }
      }
      var endIdx = startIdx + Math.min(48, times.length - startIdx);
      for (var k = startIdx; k < endIdx; k++) {
        if (temps[k] == null || isNaN(temps[k])) { endIdx = k; break; }
      }
      var n = endIdx - startIdx;
      if (n < 2) return;

      var slice = {
        times: times.slice(startIdx, endIdx),
        temps: temps.slice(startIdx, endIdx),
        apps:  apps.slice(startIdx, endIdx),
        precs: precs.slice(startIdx, endIdx).map(function(p){ return p == null ? 0 : p; }),
        probs: probs.slice(startIdx, endIdx),
        codes: codes.slice(startIdx, endIdx),
        winds: winds.slice(startIdx, endIdx),
        windDirs: windDirs.slice(startIdx, endIdx),
        hums:  hums.slice(startIdx, endIdx)
      };
      state.hourlySlice = slice;

      // ── SVG ──
      drawHourlySvg(slice.times, slice.temps, slice.precs, now);

      // Max précip pour normaliser la mini-barre
      var maxP = Math.max.apply(null, slice.precs.concat([1])); // au moins 1mm comme échelle
      if (maxP < 1) maxP = 1;
      if (maxP > 6) maxP = Math.max(6, maxP);

      // ── Cards horizontales ──
      els.hourlyScroll.innerHTML = '';
      var lastDate = slice.times[0].getDate();
      slice.times.forEach(function(t, idx){
        if (t.getDate() !== lastDate) {
          var sep = document.createElement('div');
          sep.className = 'hour-day-sep';
          var isTomorrow = isSameDay(t, new Date(Date.now() + 24*3600*1000));
          sep.textContent = (isTomorrow ? 'DEMAIN' : (DAYS_SHORT[t.getDay()] + ' ' + t.getDate())) + ' →';
          els.hourlyScroll.appendChild(sep);
          lastDate = t.getDate();
        }

        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'hour-card';
        card.dataset.idx = idx;
        var isNow = (idx === 0);
        if (isNow) card.classList.add('now');

        var p = slice.precs[idx];
        var hasRain = p > 0.05;
        if (hasRain) card.classList.add('has-rain');

        var label = isNow ? 'maintenant' : (String(t.getHours()).padStart(2,'0') + 'h');

        // Mini-barre pluie (hauteur ∝ mm, max ~12px)
        var barH = hasRain ? Math.max(2, Math.min(12, (p / maxP) * 12)) : 0;
        var mmHtml = hasRain ? '<div class="hour-precip-mm">' + p.toFixed(p < 1 ? 1 : (p < 10 ? 1 : 0)) + 'mm</div>' : '';
        var barHtml = '<div class="hour-precip-bar" aria-hidden="true">' +
          (hasRain ? '<div class="hour-precip-bar-fill" style="height:' + barH + 'px"></div>' : '') +
          '</div>';

        card.innerHTML =
          '<div class="hour-time">' + label + '</div>' +
          '<div class="hour-icon">' + wmoIcon(slice.codes[idx]) + '</div>' +
          '<div class="hour-temp">' + Math.round(slice.temps[idx]) + '°</div>' +
          barHtml + mmHtml;
        els.hourlyScroll.appendChild(card);
      });

      // Fermer panneau détail si présent
      els.hourDetail.hidden = true;
      state.selectedHour = null;
    }

    function isSameDay(a, b){
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    /* ───── Panneau détail d'une heure ───── */
    function showHourDetail(idx){
      var s = state.hourlySlice;
      if (!s) return;
      var t = s.times[idx];
      if (!t) return;

      var now = new Date();
      var todayLabel;
      var tomorrow = new Date(now.getTime() + 24*3600*1000);
      if (isSameDay(t, now)) todayLabel = 'Aujourd’hui';
      else if (isSameDay(t, tomorrow)) todayLabel = 'Demain';
      else todayLabel = DAYS_LONG[t.getDay()];

      var hhmm = String(t.getHours()).padStart(2,'0') + 'h';
      var p = s.precs[idx];
      var prob = s.probs[idx];
      var wind = s.winds[idx];
      var dir = s.windDirs[idx];
      var hum = s.hums[idx];
      var app = s.apps[idx];

      var rainBits = [];
      if (p > 0.05) rainBits.push(p.toFixed(p < 1 ? 1 : (p < 10 ? 1 : 0)) + ' mm');
      if (prob != null && !isNaN(prob)) rainBits.push(prob + ' %');
      var rainTxt = rainBits.length ? rainBits.join(' · ') : 'aucune';

      els.hourDetail.innerHTML =
        '<div class="hour-detail-head">' +
          '<div>' +
            '<div class="hour-detail-time">' + todayLabel + ' · ' + hhmm + '</div>' +
          '</div>' +
          '<div class="hour-detail-temp">' + Math.round(s.temps[idx]) + '°</div>' +
          '<button class="hour-detail-close" id="hourDetailClose" aria-label="Fermer">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button>' +
        '</div>' +
        '<div class="hour-detail-desc">' + wmoIcon(s.codes[idx]) + ' ' + wmoLabel(s.codes[idx]) + '</div>' +
        '<div class="hour-detail-grid">' +
          (app != null && !isNaN(app) ? '<div>Ressenti<b>' + Math.round(app) + '°</b></div>' : '') +
          (wind != null && !isNaN(wind) ? '<div>Vent<b>' + Math.round(wind) + ' km/h ' + windDir(dir) + '</b></div>' : '') +
          (hum != null && !isNaN(hum) ? '<div>Humidité<b>' + Math.round(hum) + ' %</b></div>' : '') +
          '<div>Pluie<b>' + rainTxt + '</b></div>' +
        '</div>';
      els.hourDetail.hidden = false;

      // Marquer la card sélectionnée
      Array.prototype.forEach.call(els.hourlyScroll.querySelectorAll('.hour-card'), function(c){
        c.classList.toggle('selected', c.dataset.idx === String(idx));
      });
      state.selectedHour = idx;

      document.getElementById('hourDetailClose').addEventListener('click', hideHourDetail);
    }

    function hideHourDetail(){
      els.hourDetail.hidden = true;
      state.selectedHour = null;
      Array.prototype.forEach.call(els.hourlyScroll.querySelectorAll('.hour-card.selected'), function(c){
        c.classList.remove('selected');
      });
    }

    /* ───── Résumé pluie avec analyse 48h ─────
       Scope :
         5h-18h : "aujourd'hui" (jusqu'à 23:59 du jour courant)
         18h-5h : "ce soir"     (jusqu'à 5h du matin suivant)
       Analyse split en 2 fenêtres :
         near  = maintenant → fin du scope  (info pour le bandeau principal)
         later = fin du scope → +48h        (pour signaler "risques demain XXh") */
    function getRainScope(now){
      var hour = now.getHours();
      var end = new Date(now);
      if (hour >= 5 && hour < 18) {
        end.setHours(23, 59, 59, 999);
        return { label: 'aujourd’hui', until: end, kind: 'day' };
      }
      if (hour >= 18) end.setDate(end.getDate() + 1);
      end.setHours(5, 0, 0, 0);
      return { label: 'ce soir', until: end, kind: 'night' };
    }

    function computeRainAnalysis(data){
      if (!data || !data.hourly) return null;
      var times = data.hourly.time.map(function(t){ return new Date(t); });
      var precs = data.hourly.precipitation;
      var probs = data.hourly.precipitation_probability || [];
      var now = new Date();
      var scope = getRainScope(now);
      var scopeEnd = scope.until.getTime();
      var futureEnd = now.getTime() + 48 * 3600 * 1000;

      var nearHours = [], laterHours = [];
      for (var i = 0; i < times.length; i++) {
        var t = times[i];
        var tt = t.getTime();
        if (tt < now.getTime() - 3600*1000) continue;
        if (tt > futureEnd) break;
        var entry = { t: t, p: precs[i] || 0, prob: probs[i] };
        if (tt <= scopeEnd) nearHours.push(entry); else laterHours.push(entry);
      }
      if (!nearHours.length && !laterHours.length) return null;

      function stats(hours){
        var totalMm = hours.reduce(function(s, x){ return s + x.p; }, 0);
        var rainyHours = hours.filter(function(x){ return x.p > 0.1; });
        var maxProb = hours.reduce(function(m, x){ return x.prob != null && x.prob > m ? x.prob : m; }, 0);
        var hMax = rainyHours.length ? Math.max.apply(null, rainyHours.map(function(x){ return x.p; })) : 0;
        return {
          totalMm: totalMm, maxProb: maxProb, rainyHours: rainyHours, hMax: hMax,
          willRain: totalMm > 0.1 || maxProb >= 60
        };
      }
      return { scope: scope, near: stats(nearHours), later: stats(laterHours) };
    }

    /* ───── État pluie & icônes SVG ───── */
    function rainIntensityState(s){
      if (s.totalMm >= 10 || s.hMax >= 4) return 'storm';
      if (s.totalMm >= 3 || s.hMax >= 1.5) return 'moderate';
      return 'light';
    }

    function dayLabel(targetDate, now){
      // "cette nuit" / "aujourd'hui" / "demain" / nom du jour (samedi…)
      var today = new Date(now); today.setHours(0,0,0,0);
      var tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      var target = new Date(targetDate); target.setHours(0,0,0,0);
      // Cas spécial : J+1 entre 0h et 5h → c'est la nuit en cours, pas "demain"
      if (target.getTime() === tomorrow.getTime() && targetDate.getHours() < 5) {
        return 'cette nuit';
      }
      if (target.getTime() === today.getTime()) return 'aujourd’hui';
      if (target.getTime() === tomorrow.getTime()) return 'demain';
      return FR_DAYS_LONG[targetDate.getDay()];
    }

    function fmtHour(d){ return d.getHours() + 'h00'; }

    var RAIN_SVGS = {

    /* ───── Bandeau pluie (analyse 48h) ───── */
    function renderRainToday(data){
      var info = computeRainAnalysis(data);
      if (!info) { els.rainToday.hidden = true; return; }

      var near = info.near, later = info.later;
      var scopeLabel = info.scope.label;
      var nearHasRain = near.rainyHours.length > 0;
      var laterHasRain = later.rainyHours.length > 0;
      var nearHighProb = near.maxProb >= 40;
      var now = new Date();

      var state, label, sub;
      var num = function(v){ return '<span class="num">' + v + '</span>'; };

      if (nearHasRain) {
        // Cas 7-10 : pluie dans le scope proche
        state = rainIntensityState(near);
        var first = near.rainyHours[0].t;
        var intensity = state === 'storm' ? 'forte' : (state === 'moderate' ? 'modérée' : 'faible');
        var minutesUntil = (first.getTime() - now.getTime()) / 60000;
        if (minutesUntil < 60) {
          // C: pluie imminente (commence dans la prochaine heure ou en cours)
          label = '<b>Pluie imminente</b> · vers ' + num(fmtHour(first));
        } else {
          label = '<b>Pluie ' + scopeLabel + '</b> · à partir de ' + num(fmtHour(first));
        }
        var mmStr = near.totalMm.toFixed(near.totalMm < 1 ? 1 : (near.totalMm < 10 ? 1 : 0)) + ' mm';
        sub = 'cumul ' + num(mmStr) + ' · intensité ' + intensity;
      } else if (laterHasRain) {
        // Cas 3-6 : sec dans le scope mais pluie après
        state = 'risk';
        var firstLater = later.rainyHours[0].t;
        var when = dayLabel(firstLater, now);
        label = '<b>Pas de pluie</b> ' + scopeLabel;
        sub = 'risques ' + when + ' à partir de ' + num(fmtHour(firstLater));
      } else if (nearHighProb) {
        // Cas 11 : pas de pluie attendue mais proba ≥ 40%
        state = 'risk';
        label = '<b>Risque d’averses</b> ' + scopeLabel;
        sub = 'probabilité max ' + num(near.maxProb + ' %') + ' · pas de cumul attendu';
      } else {
        // Cas 1-2 : sec partout sur 48h
        state = 'sunny';
        label = '<b>Pas de pluie</b> ' + scopeLabel;
        sub = 'temps sec attendu';
      }

      var isWet = (state === 'light' || state === 'moderate' || state === 'storm');
      els.rainToday.classList.toggle('wet', isWet);
      els.rainToday.innerHTML =
        '<div class="rain-today-icon ' + (isWet ? 'wet' : '') + '">' + RAIN_SVGS[state] + '</div>' +
        '<div class="rain-today-text">' + label + '<small>' + sub + '</small></div>';
      els.rainToday.hidden = false;
    }

    /* ───── Modal koala (matin, 1×/jour, message selon météo) ───── */
    var KOALA_LAST_KEY = 'meteo_koala_last_shown';
    var koalaShownThisSession = false;

    function todayISO(){
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function showKoalaModal(msg){
      var modal = document.getElementById('koalaModal');
      document.getElementById('koalaMessage').textContent = msg;
      modal.hidden = false;

      function closeKoala(){
        modal.hidden = true;
        document.removeEventListener('keydown', escClose);

      function escClose(e){ if (e.key === 'Escape') closeKoala(); }

      document.getElementById('koalaClose').onclick = closeKoala;
      document.getElementById('koalaOk').onclick = closeKoala;
      modal.onclick = function(e){ if (e.target === modal) closeKoala(); };

    var KOALA_DAY_MESSAGES = [
      'Le dimanche, tu penches 🐨',                  // 0 = dimanche
      'Le lundi, c’est spaghetti 🐨',                // 1
      'Le mardi, c’est ravioli 🐨',                  // 2
      'Le mercredi, on dit merci la vie 🐨 (c ton jour off ma star)', // 3
      'Le jeudi, c’est panzani 🐨',                  // 4

    ];

    function koalaMessageForToday(data){
      var info = computeRainAnalysis(data);
      // Message pluie prioritaire si pluie attendue sur le scope proche
      var willRain = info && info.near && info.near.willRain;
      if (willRain) return 'Prends ton parapluie aujourd’hui petit koala 🐨 ☔️';
      // Sinon, message du jour de la semaine
      return KOALA_DAY_MESSAGES[new Date().getDay()];

    function tryShowKoala(data){
      if (koalaShownThisSession) return;
      var hour = new Date().getHours();
      if (hour < 7 || hour >= 11) return;

      var last = null;
      try { last = localStorage.getItem(KOALA_LAST_KEY); } catch(e){}
      var today = todayISO();
      if (last === today) return;

      koalaShownThisSession = true;
      try { localStorage.setItem(KOALA_LAST_KEY, today); } catch(e){}

    function drawHourlySvg(times, temps, precs, now){
      var svg = els.hourlySvg;
      svg.innerHTML = '';
      els.yAxis.innerHTML = '';
      els.xAxis.innerHTML = '';
      if (!times.length) return;

      var W = 800, H = 200;
      // Pas de padL/padR : les axes sont en HTML overlay, le SVG s'étend full width
      var padL = 0, padR = 0, padT = 10, padB = 10;
      var innerW = W - padL - padR;
      var innerH = H - padT - padB;

      // Échelle Y : arrondir à l'entier inférieur/supérieur, ajouter 1° de respiration
      var rawMin = Math.min.apply(null, temps);
      var rawMax = Math.max.apply(null, temps);
      var tMin = Math.floor(rawMin - 1);
      var tMax = Math.ceil(rawMax + 1);
      if (tMax - tMin < 4) { tMax = tMin + 4; }
      var range = tMax - tMin;
      var pMax = Math.max(0.5, Math.max.apply(null, precs));

      function x(i){ return padL + (i / (times.length - 1)) * innerW; }
      function yTemp(t){ return padT + (1 - (t - tMin) / range) * innerH; }
      function yPrecBar(p){ return padT + innerH - (p / pMax) * innerH * 0.35; }

      // ── Axe Y : 3 graduations + labels HTML overlay (lisibles, pas étirés) ──
      var tMid = Math.round((tMin + tMax) / 2);
      var yTicks = [tMax, tMid, tMin];
      yTicks.forEach(function(t){
        var y = yTemp(t);
        var ln = document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('class','grid-line');
        ln.setAttribute('x1', 0); ln.setAttribute('x2', W);
        ln.setAttribute('y1', y);    ln.setAttribute('y2', y);
        svg.appendChild(ln);

        var lab = document.createElement('span');
        lab.textContent = Math.round(t) + '°';
        lab.style.top = (y / H * 100) + '%';
        els.yAxis.appendChild(lab);
      });

      // ── Séparateurs jours dans SVG + badge "DEMAIN" en HTML overlay ──
      // Clear previous badges
      Array.prototype.forEach.call(els.svgWrap.querySelectorAll('.day-badge'), function(b){ b.remove(); });
      var DAYS_FR = ['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
      var tomorrowDate = new Date(Date.now() + 24*3600*1000);
      var lastDay = times[0].getDate();
      times.forEach(function(t, i){
        if (t.getDate() !== lastDay) {
          var ln = document.createElementNS('http://www.w3.org/2000/svg','line');
          ln.setAttribute('class','day-sep');
          ln.setAttribute('x1', x(i)); ln.setAttribute('x2', x(i));
          ln.setAttribute('y1', padT); ln.setAttribute('y2', H - padB);
          svg.appendChild(ln);

          var badge = document.createElement('span');
          badge.className = 'day-badge';
          badge.textContent = isSameDay(t, tomorrowDate) ? 'demain' : DAYS_FR[t.getDay()];
          badge.style.left = (x(i) / W * 100) + '%';
          els.svgWrap.appendChild(badge);

          lastDay = t.getDate();
        }
      });

      // ── Labels heures 00h, 06h, 12h, 18h en HTML overlay ──
      times.forEach(function(t, i){
        var hh = t.getHours();
        if (hh === 0 || hh === 6 || hh === 12 || hh === 18) {
          var lab = document.createElement('span');
          lab.textContent = String(hh).padStart(2,'0') + 'h';
          lab.style.left = (x(i) / W * 100) + '%';
          els.xAxis.appendChild(lab);
        }
      });

      // ── Barres précipitations ──
      var barW = Math.max(2, innerW / times.length * 0.85);
      precs.forEach(function(p, i){
        if (p <= 0.05) return;
        var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('class','precip-bar');
        var bx = x(i) - barW/2;
        var by = yPrecBar(p);
        rect.setAttribute('x', bx);
        rect.setAttribute('y', by);
        rect.setAttribute('width', barW);
        rect.setAttribute('height', padT + innerH - by);
        svg.appendChild(rect);
      });

      // ── Courbe température : Catmull-Rom → Bezier cubic (lissage plus doux) ──
      var pts = temps.map(function(t, i){ return { x: x(i), y: yTemp(t) }; });
      function catmullRomPath(points){
        if (!points.length) return '';
        if (points.length === 1) return 'M' + points[0].x + ',' + points[0].y;
        var d = 'M' + points[0].x + ',' + points[0].y;
        var tens = 6;
        for (var i = 0; i < points.length - 1; i++) {
          var p0 = points[i - 1] || points[i];
          var p1 = points[i];
          var p2 = points[i + 1];
          var p3 = points[i + 2] || points[i + 1];
          var cp1x = p1.x + (p2.x - p0.x) / tens;
          var cp1y = p1.y + (p2.y - p0.y) / tens;
          var cp2x = p2.x - (p3.x - p1.x) / tens;
          var cp2y = p2.y - (p3.y - p1.y) / tens;
          d += ' C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2.x + ',' + p2.y;
        }
        return d;
      }
      var dPath = catmullRomPath(pts);
      var dArea = dPath + ' L' + pts[pts.length-1].x + ',' + (padT + innerH) +
                  ' L' + pts[0].x + ',' + (padT + innerH) + ' Z';

      var areaEl = document.createElementNS('http://www.w3.org/2000/svg','path');
      areaEl.setAttribute('class','temp-area');
      areaEl.setAttribute('d', dArea);
      svg.appendChild(areaEl);

      var pathEl = document.createElementNS('http://www.w3.org/2000/svg','path');
      pathEl.setAttribute('class','temp-path');
      pathEl.setAttribute('d', dPath);
      svg.appendChild(pathEl);

      // ── Point "maintenant" : dot rempli sur la courbe ──
      var nowDot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      nowDot.setAttribute('class','now-dot');
      nowDot.setAttribute('cx', pts[0].x);
      nowDot.setAttribute('cy', pts[0].y);
      nowDot.setAttribute('r', 4);
      svg.appendChild(nowDot);

      // Mémoriser pour le scrubber
      state.gPadL = padL; state.gPadR = padR; state.gW = W; state.gH = H;
      if (state.hourlySlice) state.hourlySlice.svgPoints = pts;
    }

    /* ───── Scrubber tactile sur le graph ───── */
    function indexFromClientX(clientX){
      var s = state.hourlySlice;
      if (!s) return -1;
      var rect = els.svgWrap.getBoundingClientRect();
      var relX = clientX - rect.left;
      var ratio = relX / rect.width;
      ratio = Math.max(0, Math.min(1, ratio));
      return Math.round(ratio * (s.times.length - 1));
    }

    function moveScrubber(idx){
      var s = state.hourlySlice;
      if (!s || !s.svgPoints || !s.svgPoints[idx]) return;
      var rect = els.svgWrap.getBoundingClientRect();
      var pt = s.svgPoints[idx];
      // SVG remplit svgWrap (width 100%, height 200px). Coords directes.
      var xpx = (pt.x / state.gW) * rect.width;
      var ypx = (pt.y / state.gH) * rect.height;
      els.scrubber.style.left = xpx + 'px';
      els.scrubberDot.style.top = ypx + 'px';
      var t = s.times[idx];
      var label = (idx === 0)
        ? 'maintenant'
        : String(t.getHours()).padStart(2,'0') + 'h';
      els.scrubTime.textContent = label;
      els.scrubTemp.textContent = Math.round(s.temps[idx]) + '°';
      els.scrubIcon.textContent = wmoIcon(s.codes[idx]);
      els.scrubber.hidden = false;
    }

    function hideScrubber(){
      els.scrubber.hidden = true;
    }

    var scrubState = { active: false, startX: 0, moved: false, lastIdx: -1 };
    function attachScrubber(){
      var g = els.svgWrap;
      function down(e){
        var ce = e.touches ? e.touches[0] : e;
        scrubState.active = true;
        scrubState.startX = ce.clientX;
        scrubState.moved = false;
        var idx = indexFromClientX(ce.clientX);
        if (idx >= 0) { scrubState.lastIdx = idx; moveScrubber(idx); }
      }
      function move(e){
        if (!scrubState.active) return;
        var ce = e.touches ? e.touches[0] : e;
        if (Math.abs(ce.clientX - scrubState.startX) > 4) scrubState.moved = true;
        var idx = indexFromClientX(ce.clientX);
        if (idx >= 0 && idx !== scrubState.lastIdx) {
          scrubState.lastIdx = idx;
          moveScrubber(idx);
        }
        // Empêche le scroll vertical pendant le drag horizontal sur mobile
        if (scrubState.moved && e.cancelable) e.preventDefault();
      }
      function up(){
        if (!scrubState.active) return;
        var idx = scrubState.lastIdx;
        scrubState.active = false;
        // Tap (sans drag) → ouvrir le panneau détail
        if (!scrubState.moved && idx >= 0) {
          hideScrubber();
          if (state.selectedHour === idx) { hideHourDetail(); }
          else { showHourDetail(idx); }
        } else {
          // Drag terminé : on laisse le scrubber visible quelques secondes puis on cache
          setTimeout(hideScrubber, 1800);
        }
      }
      g.addEventListener('mousedown', down);
      g.addEventListener('mousemove', function(e){ if (scrubState.active) move(e); });
      window.addEventListener('mouseup', up);
      g.addEventListener('mouseleave', function(){
        if (scrubState.active) { scrubState.active = false; setTimeout(hideScrubber, 1200); }
      });
      g.addEventListener('touchstart', down, { passive: true });
      g.addEventListener('touchmove', move, { passive: false });
      g.addEventListener('touchend', up);
      g.addEventListener('touchcancel', up);
    }

    /* ───── Vue 7 jours ───── */
    function renderDaily(data){
      if (!data || !data.daily) return;
      var d = data.daily;
      els.dailyList.innerHTML = '<div class="daily-header">Max. <span class="sep">/</span> <span class="min">Min.</span></div>';

      // d.time est ISO "YYYY-MM-DD" ; parser composant par composant pour éviter timezone shift
      function parseDay(s){ var p = s.split('-'); return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2])); }
      var times = d.time.map(parseDay);
      var DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
      var MONTHS = ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
      var today = new Date(); today.setHours(0,0,0,0);

      times.forEach(function(t, i){
        var row = document.createElement('div');
        var isToday = t.getTime() === today.getTime();
        var isPast = t.getTime() < today.getTime();
        if (isPast) return;
        if (d.temperature_2m_max[i] == null) return;
        row.className = 'day-row' + (isToday ? ' today' : '');

        var labelMain = isToday ? 'Aujourd’hui' : DAYS[t.getDay()];
        var labelSub = String(t.getDate()).padStart(2,'0') + ' ' + MONTHS[t.getMonth()];

        row.innerHTML =
          '<div class="day-label">' +
            '<div class="day-label-main">' + labelMain + '</div>' +
            '<div class="day-label-sub">' + labelSub + ' · ' + wmoLabel(d.weather_code[i]) + '</div>' +
          '</div>' +
          '<div class="day-icon">' + wmoIcon(d.weather_code[i]) + '</div>' +
          '<div class="day-range" title="Max / Min">' +
            '<b>' + Math.round(d.temperature_2m_max[i]) + '°</b>' +
            '<span class="sep">/</span>' +
            '<span class="min">' + Math.round(d.temperature_2m_min[i]) + '°</span>' +
          '</div>';
        els.dailyList.appendChild(row);
      });
    }

    /* ───── Partage URL ───── */
    function buildShareURL(loc){
      var u = new URL(window.location.href);
      u.search = '';
      u.searchParams.set('lat', loc.lat.toFixed(4));
      u.searchParams.set('lon', loc.lon.toFixed(4));
      if (loc.name) u.searchParams.set('city', loc.name);
      return u.toString();
    }
    function share(){
      var url = buildShareURL(state.loc);
      var doNative = navigator.share && /Mobi|Android|iPhone/.test(navigator.userAgent);
      if (doNative) {
        navigator.share({ title: 'Météo · ' + state.loc.name, text: 'Météo à ' + state.loc.name, url: url }).catch(function(){});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function(){
          els.shareBtn.classList.add('copied');
          var label = els.shareBtn.querySelector('span');
          var old = label.textContent;
          label.textContent = 'lien copié !';
          setTimeout(function(){ label.textContent = old; els.shareBtn.classList.remove('copied'); }, 1800);
        });
      } else {
        prompt('Copier ce lien :', url);
      }
    }

    /* ───── Pipeline principal ───── */
    function setLocation(loc, opts){
      opts = opts || {};
      var keepSpinner = !!opts.keepSpinner;
      state.loc = loc;
      renderCity(loc);
      if (!keepSpinner) {
        els.currentTemp.innerHTML = '<span class="loading"></span>';
        els.currentDesc.textContent = 'chargement…';
        els.currentMeta.innerHTML = '';
      }

      // Push URL state pour le partage
      try {
        var u = new URL(window.location.href);
        u.searchParams.set('lat', loc.lat.toFixed(4));
        u.searchParams.set('lon', loc.lon.toFixed(4));
        if (loc.name) u.searchParams.set('city', loc.name);
        window.history.replaceState({}, '', u);
      } catch(e){}

      // Mémoriser pour fast-paint à la prochaine visite
      try { localStorage.setItem(LAST_LOC_KEY, JSON.stringify(loc)); } catch(e){}

      return fetchForecast(loc.lat, loc.lon).then(function(data){
        state.data = data;
        renderCurrent(data);
        renderHourly(data);
        renderDaily(data);
        renderNowcast(data);
        renderRainToday(data);
        renderVigilance(computeVigilance(data));
        updateSourceLine();
        tryShowKoala(data);
      }).catch(function(err){
        console.error('[meteo] fetch error', err);
        if (!keepSpinner) {
          els.currentTemp.textContent = '—';
          els.currentDesc.innerHTML = '<span style="opacity:.6">prévisions indisponibles</span>';
          els.currentMeta.innerHTML = '<span style="font-style:italic">réseau ou Open-Meteo injoignable</span>';
        }
      });
    }

    function readLastLoc(){
      try {
        var raw = localStorage.getItem(LAST_LOC_KEY);
        if (!raw) return null;
        var l = JSON.parse(raw);
        if (l && typeof l.lat === 'number' && typeof l.lon === 'number') return l;
      } catch(e){}
      return null;
    }

    /* ───── Listeners ───── */
    // Click sur une mini card horaire → panneau détail
    els.hourlyScroll.addEventListener('click', function(e){
      var card = e.target.closest('.hour-card');
      if (!card) return;
      var idx = parseInt(card.dataset.idx, 10);
      if (isNaN(idx)) return;
      if (state.selectedHour === idx) { hideHourDetail(); return; }
      showHourDetail(idx);
    });

    // Scrubber tactile sur le graph
    attachScrubber();
    attachEgg();

    // Toggle expand/collapse de la card current
    (function attachCurrentToggle(){
      var current = document.getElementById('current');
      var toggle = document.getElementById('currentToggle');
      toggle.addEventListener('click', function(){
        var expanded = current.classList.toggle('expanded');
        toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggle.setAttribute('aria-label', expanded ? 'Masquer les détails' : 'Voir les détails');
      });
    })();

    els.cityEdit.addEventListener('click', openCitySearch);
    els.cityInput.addEventListener('input', function(e){ searchCities(e.target.value.trim()); });
    els.cityInput.addEventListener('keydown', function(e){
      if (e.key === 'Escape') closeCitySearch();
    });
    document.addEventListener('click', function(e){
      if (!els.cityInputWrap.hidden && !els.cityInputWrap.contains(e.target) && e.target !== els.cityEdit && !els.cityEdit.contains(e.target)) {
        closeCitySearch();
      }
    });
    document.querySelectorAll('.toggle-btn').forEach(function(b){
      b.addEventListener('click', function(){ setView(b.dataset.view); });
    });
    els.shareBtn.addEventListener('click', share);

    /* ───── Init ─────
       Stratégie : fast-paint avec cache, puis résolution réelle en arrière-plan.
       Priorités : URL (?lat&lon) > localStorage > géoloc navigateur > IP > Rennes. */
    (function initBoot(){
      var p = new URLSearchParams(window.location.search);
      if (p.get('lat') && p.get('lon')) {
        // Lien partagé : utiliser directement, pas de résolution
        setLocation({
          lat: parseFloat(p.get('lat')),
          lon: parseFloat(p.get('lon')),
          name: p.get('city') || 'Lieu partagé',
          country: '', admin: '',
          dept: p.get('dept') || null
        });
        return;
      }

      var lastLoc = readLastLoc();
      var firstPainted = false;
      if (lastLoc) {
        firstPainted = true;
        setLocation(lastLoc); // affiche tout de suite (cache 15min → quasi-instantané si récent)
      }

      // Résolution réelle en parallèle
      getInitialLoc().then(function(loc){
        if (!loc) return;
        // Si pas de premier paint, ou si la loc résolue est sensiblement différente → setLocation
        if (!firstPainted) { setLocation(loc); return; }
        var dLat = Math.abs(loc.lat - lastLoc.lat);
        var dLon = Math.abs(loc.lon - lastLoc.lon);
        if (dLat > 0.05 || dLon > 0.05) {
          setLocation(loc, { keepSpinner: true });
        } else {
          // Même ville, on garde lastLoc mais on met à jour le nom si plus précis
          if (loc.name && loc.name !== lastLoc.name) {
            state.loc.name = loc.name;
            renderCity(state.loc);
            try { localStorage.setItem(LAST_LOC_KEY, JSON.stringify(state.loc)); } catch(e){}
          }
        }
      });
    })();

  })();
  </script>

  <script src="/nav.js"></script>
</body>
</html>
