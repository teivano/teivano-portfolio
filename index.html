<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLB</title>
  <link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Georgia,serif' font-size='52' fill='%236B1A1A' text-anchor='middle'%3ETLB%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&family=Great+Vibes&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

    /* ── Main — logo au premier tiers ── */
    .main {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding-top: clamp(5rem, 20vh, 14rem);
      /* Animation ici plutôt que sur le SVG : le layer GPU est 100vw,
         le débordement du B de Great Vibes n'est jamais clippé. */
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) .5s both;
    }

    /* ── Logo texte HTML ── */
    .tlb-logo {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.5rem, 15vw, 9rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1;
    }

    .tlb-year {
      position: fixed; top: 1.5rem; left: 1.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(.55rem, 1vw, .68rem);
      font-weight: 300;
      letter-spacing: .38em;
      color: var(--ink2);
      z-index: 10;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) .95s both;
    }

    /* ── Horloge bas-gauche ── */
    .tlb-clock {
      position: fixed; bottom: 1.5rem; left: 1.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(.55rem, 1vw, .68rem);
      font-weight: 300;
      letter-spacing: .22em;
      color: var(--ink2);
      z-index: 10;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) 1.2s both;
    }

    /* ── Hamburger → croix ── */
    .ham {
      position: fixed; top: 1.5rem; right: 1.8rem;
      z-index: 1001;
      width: 26px; height: 17px;
      cursor: pointer; border: none; background: none; padding: 0;
      display: flex; flex-direction: column; justify-content: space-between;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) 1s both;
    }
    .ham-line {
      display: block; width: 100%; height: 1.5px;
      background: var(--ink);
      transform-origin: center;
      transition: background .3s ease, transform .3s cubic-bezier(.16,1,.3,1), opacity .25s ease;
    }
    .ham.open .ham-line               { background: var(--bg); }
    .ham.open .ham-line:nth-child(1)  { transform: translateY(7.25px) rotate(45deg); }
    .ham.open .ham-line:nth-child(2)  { opacity: 0; transform: scaleX(0); }
    .ham.open .ham-line:nth-child(3)  { transform: translateY(-8.25px) rotate(-45deg); }

    /* ── Nav overlay — items gauche + séparateurs ── */
    .tlb-nav { width: 100%; max-width: 680px; }
    .tlb-nav-item {
      display: flex; flex-direction: column; gap: .45rem;
      padding: 1.8rem 0;
      border-top: 1px solid rgba(255,255,255,.12);
      text-decoration: none;
      transition: opacity .2s;
    }
    .tlb-nav-item:last-child { border-bottom: 1px solid rgba(255,255,255,.12); }
    .tlb-nav-item:hover { opacity: .65; }
    .tlb-nav-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 300;
      color: var(--bg);
      letter-spacing: -.02em;
      line-height: 1;
    }
    .tlb-nav-desc {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .65rem;
      font-weight: 300;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
    }
  </style>
</head>
<body>

  <!-- Palette (aléatoire au chargement) -->
  <script>
    (function(){
      var P=[
        {s:'#B8C9E8',b:'#F5F0E8',i:'#6B1A1A',i2:'rgba(107,26,26,.45)'},
        {s:'#A8D5C5',b:'#F2F7F5',i:'#961E50',i2:'rgba(150,30,80,.45)'},
        {s:'#F5C9A8',b:'#FDF8F3',i:'#0A3868',i2:'rgba(10,56,104,.45)'},
        {s:'#C8D4B0',b:'#F5F7EF',i:'#2D0A65',i2:'rgba(45,10,101,.45)'}
      ];
      var p=P[Math.floor(Math.random()*P.length)];
      var r=document.documentElement.style;
      r.setProperty('--stripe',p.s);
      r.setProperty('--bg',p.b);
      r.setProperty('--ink',p.i);
      r.setProperty('--ink2',p.i2);
      document.body.style.background=p.b;
      var svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='72' font-family='Georgia,serif' font-weight='300' font-size='52' fill='"+p.i+"' text-anchor='middle' letter-spacing='-3'>TLB</text></svg>";
      document.getElementById('favicon').href='data:image/svg+xml,'+encodeURIComponent(svg);
    })();
  </script>

  <!-- Horloge -->
  <div class="tlb-clock" id="tlbClock" aria-live="off" aria-label="Heure"></div>

  <!-- Stripes -->
  <div class="page-stripes" id="stripes" aria-hidden="true"></div>

  <!-- Hamburger -->
  <button class="ham" id="hamBtn" aria-label="Menu" aria-expanded="false">
    <span class="ham-line"></span>
    <span class="ham-line"></span>
    <span class="ham-line"></span>
  </button>

  <!-- 2026 coin haut-gauche -->
  <p class="tlb-year" aria-hidden="true">2026</p>

  <!-- Main -->
  <main class="main">
    <h1 class="tlb-logo">TLB</h1>
  </main>

  <!-- Overlay nav -->
  <div class="tlb-overlay" id="tlbOverlay" role="dialog" aria-modal="true" aria-label="Navigation">
    <nav class="tlb-nav">
      <a class="tlb-nav-item" href="/transports.html">
        <span class="tlb-nav-title">Transports</span>
        <span class="tlb-nav-desc">Lignes A & B · temps réel</span>
      </a>
      <a class="tlb-nav-item" href="/demo-api.html">
        <span class="tlb-nav-title">Démo API</span>
        <span class="tlb-nav-desc">APIs ouvertes — transports, carburant, satellites</span>
      </a>
      <a class="tlb-nav-item" href="https://w.teivano.fr">
        <span class="tlb-nav-title">Workout Tracker</span>
        <span class="tlb-nav-desc">Suivi d'entraînement personnel</span>
      </a>
    </nav>
  </div>

  <script>
    // Stripes
    (function(){
      var el=document.getElementById('stripes');
      var N=8;
      for(var i=0;i<N*2-1;i++){
        var s=document.createElement('div');
        var isStripe=i%2===0;
        s.className='page-stripe'+(isStripe?'':' gap');
        if(isStripe){
          s.style.background='var(--stripe)';
          var dur=(0.45+Math.random()*0.55).toFixed(2);
          var del=(Math.floor(i/2)*0.06+Math.random()*0.1).toFixed(2);
          s.style.animation='stripeDrop '+dur+'s cubic-bezier(.16,1,.3,1) '+del+'s both';
        }
        el.appendChild(s);
      }
    })();

    // Nav overlay
    var overlay=document.getElementById('tlbOverlay');
    var hamBtn=document.getElementById('hamBtn');
    function openNav(){
      overlay.classList.add('open');
      hamBtn.classList.add('open');
      hamBtn.setAttribute('aria-expanded','true');
    }
    function closeNav(){
      overlay.classList.remove('open');
      hamBtn.classList.remove('open');
      hamBtn.setAttribute('aria-expanded','false');
    }
    hamBtn.addEventListener('click', function(){
      hamBtn.classList.contains('open') ? closeNav() : openNav();
    });
    overlay.addEventListener('click',function(e){ if(e.target===overlay) closeNav(); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeNav(); });

    // Horloge
    (function(){
      var el=document.getElementById('tlbClock');
      var MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      function tick(){
        var d=new Date();
        var h=String(d.getHours()).padStart(2,'0');
        var m=String(d.getMinutes()).padStart(2,'0');
        var s=String(d.getSeconds()).padStart(2,'0');
        var dd=String(d.getDate()).padStart(2,'0');
        el.textContent=h+':'+m+':'+s+' · '+dd+' '+MOIS[d.getMonth()];
      }
      tick(); setInterval(tick,1000);
    })();

  </script>

</body>
</html>
