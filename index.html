<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLB</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='a' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%238b5cf6'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230a0a12'/><circle cx='74' cy='26' r='30' fill='%238b5cf6' opacity='.11'/><circle cx='26' cy='74' r='24' fill='%2306b6d4' opacity='.09'/><text x='50' y='66' font-family='-apple-system,BlinkMacSystemFont,Helvetica Neue,sans-serif' font-weight='900' font-size='37' fill='url(%23a)' text-anchor='middle' letter-spacing='-2'>TLB</text><rect x='26' y='74' width='48' height='3' rx='1.5' fill='url(%23a)'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Curseur custom (desktop uniquement) -->
  <div id="cursor" aria-hidden="true">
    <div class="cur-dot"></div>
    <div class="cur-ring"></div>
  </div>

  <!-- Bouton permission gyroscope (iOS 13+) -->
  <button class="gyro-btn" id="gyroBtn">Activer le mouvement</button>

  <!-- Conteneur de slides — navigation swipe -->
  <div class="slides" id="slides">

    <!-- ══ S1 · @property — Sphère ══════════════════════════ -->
    <section class="scene" id="s1" data-index="01">
      <div class="scene-bg bg1"></div>
      <div class="stage">
        <div class="sphere" id="sphere">
          <div class="sphere-shine"></div>
          <div class="sphere-depth"></div>
        </div>
      </div>
      <div class="scene-label">
        <span class="lbl-feat">@property</span>
        <span class="lbl-name">Sphère</span>
      </div>
    </section>

    <!-- ══ S2 · Touch + feTurbulence — Onde ════════════════ -->
    <section class="scene" id="s2" data-index="02">
      <div class="scene-bg bg2"></div>
      <div class="stage">
        <div class="wave-wrap" id="waveWrap">
          <svg class="wave-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <filter id="waveFilter" x="-25%" y="-25%" width="150%" height="150%">
                <feTurbulence id="feTurb"
                  type="fractalNoise"
                  baseFrequency="0.014 0.009"
                  numOctaves="5"
                  seed="7"
                  result="noise"/>
                <feDisplacementMap id="feDisp"
                  in="SourceGraphic" in2="noise"
                  scale="38"
                  xChannelSelector="R" yChannelSelector="G"/>
              </filter>
              <radialGradient id="waveGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%"   stop-color="rgba(16,185,129,.96)"/>
                <stop offset="50%"  stop-color="rgba(6,182,212,.80)"/>
                <stop offset="100%" stop-color="rgba(99,102,241,.35)"/>
              </radialGradient>
            </defs>
            <circle cx="200" cy="200" r="168" fill="url(#waveGrad)" filter="url(#waveFilter)"/>
          </svg>
          <div class="wave-glass"></div>
        </div>
      </div>
      <div class="scene-label">
        <span class="lbl-feat">Touch + feTurbulence</span>
        <span class="lbl-name">Onde</span>
      </div>
    </section>

    <!-- ══ S3 · transform3d — Strata ═══════════════════════ -->
    <section class="scene" id="s3" data-index="03">
      <div class="scene-bg bg3"></div>
      <div class="stage">
        <div class="strata-scene">
          <div class="strata" id="strata">
            <div class="plate plate1">
              <span class="plate-shine"></span>
            </div>
            <div class="plate plate2">
              <span class="plate-shine"></span>
            </div>
            <div class="plate plate3">
              <span class="plate-shine"></span>
            </div>
            <div class="plate plate4">
              <span class="plate-shine"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="scene-label">
        <span class="lbl-feat">transform3d</span>
        <span class="lbl-name">Strata</span>
      </div>
    </section>

    <!-- ══ S4 · mix-blend-mode + clip-path — Prisme ════════ -->
    <section class="scene" id="s4" data-index="04">
      <div class="scene-bg bg4"></div>
      <div class="stage">
        <div class="prism-wrap" id="prismWrap">
          <div class="prism-ray pr1"></div>
          <div class="prism-ray pr2"></div>
          <div class="prism-ray pr3"></div>
          <div class="prism-core"></div>
        </div>
      </div>
      <div class="scene-label">
        <span class="lbl-feat">mix-blend-mode + clip-path</span>
        <span class="lbl-name">Prisme</span>
      </div>
    </section>

    <!-- ══ S5 · clip-path + @property — Morphe ═════════════ -->
    <section class="scene" id="s5" data-index="05">
      <div class="scene-bg bg5"></div>
      <div class="stage">
        <div class="morph-wrap" id="morphWrap">
          <div class="morph" id="morph"></div>
          <div class="morph-glow"></div>
        </div>
      </div>
      <div class="scene-label">
        <span class="lbl-feat">clip-path + @property</span>
        <span class="lbl-name">Morphe</span>
      </div>
    </section>

  </div><!-- /.slides -->

  <!-- Navigation dots (côté droit) -->
  <nav class="dots" id="dotsNav" aria-label="Navigation">
    <button class="dot active" data-to="0" aria-label="Sphère"></button>
    <button class="dot" data-to="1" aria-label="Onde"></button>
    <button class="dot" data-to="2" aria-label="Strata"></button>
    <button class="dot" data-to="3" aria-label="Prisme"></button>
    <button class="dot" data-to="4" aria-label="Morphe"></button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
