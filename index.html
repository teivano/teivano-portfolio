<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Curseur custom (desktop uniquement) -->
  <div id="cursor" aria-hidden="true">
    <div class="cur-dot"></div>
    <div class="cur-ring"></div>
  </div>

  <!-- Bouton permission gyroscope (iOS 13+) -->
  <button class="gyro-btn" id="gyroBtn">Activer le mouvement</button>

  <!-- ══════════════════════════════════════════════
       S1 · @property — Gradient Vivant
       Démo : les couleurs d'un gradient s'animent
       fluidement grâce à @property (impossible sans)
  ══════════════════════════════════════════════ -->
  <section class="scene" id="s1" data-label="@property" data-name="Gradient Vivant" data-index="01">
    <div class="scene-bg bg1"></div>
    <div class="stage">
      <div class="sphere" id="sphere">
        <div class="sphere-shine"></div>
        <div class="sphere-depth"></div>
      </div>
    </div>
    <div class="scene-label">
      <span class="lbl-feat">@property</span>
      <span class="lbl-name">Gradient Vivant</span>
    </div>
    <div class="scroll-cue" aria-hidden="true">
      <div class="scroll-line"></div>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       S2 · SVG feTurbulence — Matière Liquide
       Démo : filtre SVG feTurbulence + feDisplacementMap
       animé en JS pour simuler une matière organique
  ══════════════════════════════════════════════ -->
  <section class="scene" id="s2" data-index="02">
    <div class="scene-bg bg2"></div>
    <div class="stage">
      <div class="turb-wrap" id="turbWrap">
        <svg class="turb-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <filter id="turbFilter" x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence id="feTurb"
                type="fractalNoise"
                baseFrequency="0.012 0.008"
                numOctaves="4"
                seed="2"
                result="noise"/>
              <feDisplacementMap
                in="SourceGraphic" in2="noise"
                scale="55"
                xChannelSelector="R" yChannelSelector="G"/>
            </filter>
            <radialGradient id="turbGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stop-color="rgba(16,185,129,.95)"/>
              <stop offset="45%"  stop-color="rgba(6,182,212,.75)"/>
              <stop offset="100%" stop-color="rgba(139,92,246,.3)"/>
            </radialGradient>
          </defs>
          <circle cx="200" cy="200" r="165" fill="url(#turbGrad)" filter="url(#turbFilter)"/>
        </svg>
        <!-- Plaque glass par-dessus -->
        <div class="turb-glass"></div>
      </div>
    </div>
    <div class="scene-label">
      <span class="lbl-feat">SVG feTurbulence</span>
      <span class="lbl-name">Matière Liquide</span>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       S3 · CSS perspective — Dimension
       Démo : cube 3D pur CSS, 6 faces glassmorphism,
       rotation pilotée par la souris ou le gyroscope
  ══════════════════════════════════════════════ -->
  <section class="scene" id="s3" data-index="03">
    <div class="scene-bg bg3"></div>
    <div class="stage">
      <div class="cube-scene">
        <div class="cube" id="cube">
          <div class="face face-f"></div>
          <div class="face face-b"></div>
          <div class="face face-r"></div>
          <div class="face face-l"></div>
          <div class="face face-t"></div>
          <div class="face face-bo"></div>
        </div>
      </div>
    </div>
    <div class="scene-label">
      <span class="lbl-feat">CSS perspective</span>
      <span class="lbl-name">Dimension</span>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       S4 · mix-blend-mode — Fusion
       Démo : 3 cercles avec mix-blend-mode:screen,
       isolation:isolate, parallax souris/gyro
  ══════════════════════════════════════════════ -->
  <section class="scene" id="s4" data-index="04">
    <div class="scene-bg bg4"></div>
    <div class="stage">
      <div class="blend-wrap" id="blendWrap">
        <div class="bc bc1"></div>
        <div class="bc bc2"></div>
        <div class="bc bc3"></div>
      </div>
    </div>
    <div class="scene-label">
      <span class="lbl-feat">mix-blend-mode</span>
      <span class="lbl-name">Fusion</span>
    </div>
  </section>


  <!-- ══════════════════════════════════════════════
       S5 · scroll-timeline — Chorégraphie
       Démo : barres animées via scroll-timeline CSS
       natif + fallback IntersectionObserver
  ══════════════════════════════════════════════ -->
  <section class="scene" id="s5" data-index="05">
    <div class="scene-bg bg5"></div>
    <div class="stage">
      <div class="bars-wrap" id="barsWrap">
        <div class="bars-glass"></div>
        <div class="bars-inner">
          <!-- Hauteurs définies via --h en CSS -->
          <div class="bar" style="--h:45%;--i:0"></div>
          <div class="bar" style="--h:78%;--i:1"></div>
          <div class="bar" style="--h:52%;--i:2"></div>
          <div class="bar" style="--h:91%;--i:3"></div>
          <div class="bar" style="--h:63%;--i:4"></div>
          <div class="bar" style="--h:82%;--i:5"></div>
          <div class="bar" style="--h:48%;--i:6"></div>
          <div class="bar" style="--h:70%;--i:7"></div>
        </div>
      </div>
    </div>
    <div class="scene-label">
      <span class="lbl-feat">scroll-timeline</span>
      <span class="lbl-name">Chorégraphie</span>
    </div>
  </section>


  <script src="script.js"></script>
</body>
</html>
