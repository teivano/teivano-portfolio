<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLB</title>
  <link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Georgia,serif' font-size='52' fill='%236B1A1A' text-anchor='middle'%3ETLB%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

    .main {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .tlb-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(7rem, 22vw, 18rem);
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -.04em;
      line-height: .85;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) .7s both;
      cursor: pointer;
      user-select: none;
      transition: opacity .2s;
    }
    .tlb-logo:hover { opacity: .75; }

    .tlb-sub {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(.62rem, 1.4vw, .78rem);
      font-weight: 300;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-top: 1.8rem;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) .95s both;
    }

    .tlb-hint {
      position: fixed; bottom: 2.2rem; left: 50%; transform: translateX(-50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--ink2); z-index: 2;
      animation: tlbFadeUp .9s cubic-bezier(.16,1,.3,1) 1.3s both;
      cursor: pointer; border: none; background: none; padding: .5rem;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .tlb-hint:hover { opacity: .6; }
  </style>
</head>
<body>

  <!-- Palette (aléatoire au chargement) -->
  <script>
    (function(){
      var P=[
        {s:'#B8C9E8',b:'#F5F0E8',i:'#6B1A1A',i2:'rgba(107,26,26,.45)'},
        {s:'#A8D5C5',b:'#F2F7F5',i:'#961E50',i2:'rgba(150,30,80,.45)'},
        {s:'#F5C9A8',b:'#FDF8F3',i:'#0A3868',i2:'rgba(10,56,104,.45)'},
        {s:'#C8D4B0',b:'#F5F7EF',i:'#2D0A65',i2:'rgba(45,10,101,.45)'}
      ];
      var p=P[Math.floor(Math.random()*P.length)];
      var r=document.documentElement.style;
      r.setProperty('--stripe',p.s);
      r.setProperty('--bg',p.b);
      r.setProperty('--ink',p.i);
      r.setProperty('--ink2',p.i2);
      document.body.style.background=p.b;
      var svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='72' font-family='Georgia,serif' font-weight='300' font-size='52' fill='"+p.i+"' text-anchor='middle' letter-spacing='-3'>TLB</text></svg>";
      document.getElementById('favicon').href='data:image/svg+xml,'+encodeURIComponent(svg);
    })();
  </script>

  <!-- Stripes -->
  <div class="page-stripes" id="stripes" aria-hidden="true"></div>

  <!-- Main -->
  <main class="main">
    <div class="tlb-logo" onclick="openNav()" role="button" tabindex="0"
         aria-label="Ouvrir la navigation" onkeydown="if(event.key==='Enter')openNav()">TLB</div>
    <p class="tlb-sub">Thibault Le Bouëdec · Développeur</p>
  </main>

  <!-- Nav hint -->
  <button class="tlb-hint" onclick="openNav()">Explorer les projets ↗</button>

  <!-- Overlay nav -->
  <div class="tlb-overlay" id="tlbOverlay" role="dialog" aria-modal="true" aria-label="Navigation">
    <button class="tlb-overlay-close" onclick="closeNav()">Fermer ×</button>
    <a class="tlb-overlay-link" href="/transports.html">Transports</a>
    <a class="tlb-overlay-link" href="/demo-api.html">Démo API</a>
  </div>

  <script>
    // Stripes
    (function(){
      var el=document.getElementById('stripes');
      var N=8;
      for(var i=0;i<N*2-1;i++){
        var s=document.createElement('div');
        var isStripe=i%2===0;
        s.className='page-stripe'+(isStripe?'':' gap');
        if(isStripe){
          s.style.background='var(--stripe)';
          var dur=(0.45+Math.random()*0.55).toFixed(2);
          var del=(Math.floor(i/2)*0.06+Math.random()*0.1).toFixed(2);
          s.style.animation='stripeDrop '+dur+'s cubic-bezier(.16,1,.3,1) '+del+'s both';
        }
        el.appendChild(s);
      }
    })();

    // Nav overlay
    var overlay=document.getElementById('tlbOverlay');
    function openNav(){ overlay.classList.add('open'); }
    function closeNav(){ overlay.classList.remove('open'); }
    document.addEventListener('keydown',function(e){ if(e.key==='Escape')closeNav(); });
  </script>

</body>
</html>
