<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Koala — TLB</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='72' text-anchor='middle'%3E%F0%9F%90%A8%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&family=Great+Vibes&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1F2540;
      --bg-deep: #161A2F;
      --bg-top: #2B2A4F;
      --ink: #E8DBC4;
      --ink2: rgba(232, 219, 196, 0.55);
      --ink3: rgba(232, 219, 196, 0.18);
      /* Override les tokens overlay pour conserver le visuel "TLB dark"
         malgré le thème inversé de la page (ink=crème, bg=foncé) */
      --overlay-bg: #6B1A1A;
      --overlay-fg: #F5F0E8;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: var(--ink);
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      background:
        radial-gradient(ellipse at top, var(--bg-top) 0%, transparent 55%),
        radial-gradient(ellipse at bottom, var(--bg-deep) 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 50%, var(--bg-deep) 100%);
    }

    /* ── Étoiles ── */
    .stars {
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 12%, rgba(232,219,196,.6), transparent 60%),
        radial-gradient(1px 1px at 22% 8%,  rgba(232,219,196,.4), transparent 60%),
        radial-gradient(1.5px 1.5px at 40% 15%, rgba(232,219,196,.8), transparent 60%),
        radial-gradient(1px 1px at 65% 6%,  rgba(232,219,196,.5), transparent 60%),
        radial-gradient(1px 1px at 80% 18%, rgba(232,219,196,.7), transparent 60%),
        radial-gradient(1px 1px at 92% 10%, rgba(232,219,196,.4), transparent 60%),
        radial-gradient(1px 1px at 15% 24%, rgba(232,219,196,.35), transparent 60%),
        radial-gradient(1.5px 1.5px at 55% 28%, rgba(232,219,196,.6), transparent 60%),
        radial-gradient(1px 1px at 78% 32%, rgba(232,219,196,.4), transparent 60%),
        radial-gradient(1px 1px at 32% 36%, rgba(232,219,196,.35), transparent 60%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: .55; } 100% { opacity: 1; } }

    /* ── Lune ── */
    .moon {
      position: fixed;
      top: clamp(2rem, 7vh, 5rem);
      right: clamp(2rem, 10vw, 6rem);
      width: clamp(44px, 9vw, 70px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 32%, #f4ecd8, #d6c8a8 70%, #b8aa86);
      box-shadow: 0 0 28px rgba(244,236,216,0.22), 0 0 60px rgba(244,236,216,0.1);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Collection ── */
    .collection {
      position: fixed;
      top: clamp(3.8rem, 9.5vh, 5.2rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: clamp(0.3rem, 1.4vw, 0.55rem);
      z-index: 10;
      padding: 0 1rem;
      pointer-events: none;
    }
    .col-slot {
      width: clamp(32px, 8.5vw, 42px);
      height: clamp(32px, 8.5vw, 42px);
      border: 1.5px solid var(--ink3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.55;
      background: rgba(232,219,196,0.02);
      transition: all 0.5s cubic-bezier(.16,1,.3,1);
    }
    .col-icon {
      display: block;
      font-size: clamp(0.95rem, 3.2vw, 1.2rem);
      line-height: 1;
      opacity: 0;
      transform: scale(0.3);
    }
    .col-icon.col-tlb {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(0.85rem, 3vw, 1.05rem);
      letter-spacing: 0.02em;
    }
    .col-slot.found {
      opacity: 1;
      border-color: rgba(232,219,196,0.55);
      background: rgba(232,219,196,0.1);
      transform: scale(1.08);
    }
    .col-slot.found .col-icon {
      opacity: 1;
      transform: scale(1);
      animation: pop 0.65s cubic-bezier(.5,1.6,.5,1.05);
    }
    .col-slot.found .col-icon.col-tlb {
      transform: scale(1);
    }
    @keyframes pop {
      0%   { transform: scale(0.3); opacity: 0; }
      55%  { transform: scale(1.35); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* ── Koala ── */
    .koala-pos {
      position: fixed;
      left: 50%;
      top: 62%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }
    .koala {
      display: inline-block;
      font-size: clamp(3.5rem, 14vw, 5.8rem);
      pointer-events: auto;
      cursor: pointer;
      animation: breathe 3.6s ease-in-out infinite;
      transform-origin: center;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      padding: 12px;
      margin: -12px;
      line-height: 1;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.97); }
      50%      { transform: scale(1.03); }
    }
    .koala.turning { animation: turnOver 0.85s ease-in-out; }
    @keyframes turnOver {
      0%   { transform: scaleX(1)  rotate(0); }
      30%  { transform: scaleX(1)  rotate(-14deg); }
      55%  { transform: scaleX(-1) rotate(10deg); }
      100% { transform: scaleX(-1) rotate(0); }
    }
    .koala.shushing { animation: shushWiggle 0.45s ease-in-out 3; }
    @keyframes shushWiggle {
      0%, 100% { transform: scale(1.05) rotate(0); }
      30%      { transform: scale(1.05) rotate(-5deg); }
      70%      { transform: scale(1.05) rotate(5deg); }
    }

    /* ── ZZ et !! qui émanent ── */
    .zzz {
      --dir: 1;
      position: fixed;
      transform: translate(-50%, -50%);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      animation: zzz-float 3.6s ease-out forwards;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.35));
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
      line-height: 1;
    }
    /* Drift latéral diagonal (gauche ou droite via --dir) */
    @keyframes zzz-float {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      18%  { opacity: 0.85; transform: translate(calc(-50% + 30px * var(--dir)), calc(-50% + 4px)) scale(1); }
      60%  { opacity: 0.85; transform: translate(calc(-50% + 90px * var(--dir)), calc(-50% + 14px)) scale(1.05); }
      100% { opacity: 0; transform: translate(calc(-50% + 140px * var(--dir)), calc(-50% + 24px)) scale(1.1); }
    }
    .zzz.bang {
      font-size: clamp(1.4rem, 4.5vw, 1.9rem);
      animation: bang-pop 1.5s ease-out forwards;
    }
    @keyframes bang-pop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      18%  { opacity: 1; transform: translate(-50%, calc(-50% - 18px)) scale(1.25); }
      70%  { opacity: 1; transform: translate(-50%, calc(-50% - 38px)) scale(1); }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 55px)) scale(0.9); }
    }

    /* ── Bulles de rêves ── */
    .dream {
      position: fixed;
      transform: translate(-50%, -50%);
      font-size: clamp(2rem, 7vw, 2.6rem);
      cursor: pointer;
      pointer-events: auto;
      user-select: none;
      z-index: 5;
      animation: floatUp 6.8s linear forwards;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.35));
      will-change: transform, opacity;
      padding: 14px;
      line-height: 1;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }
    .dream-tlb {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.8rem, 6.5vw, 2.5rem);
      color: var(--ink);
      letter-spacing: 0.02em;
      text-shadow: 0 0 14px rgba(232,219,196,0.45), 0 2px 6px rgba(0,0,0,0.3);
      display: inline-block;
      line-height: 1;
    }
    body.frozen .dream {
      animation-play-state: paused;
      pointer-events: none;
    }
    .dream.caught {
      animation: caught 0.45s cubic-bezier(.5,1.6,.5,1) forwards;
      pointer-events: none;
    }

    /* La fin de floatUp = "éclatement" de la bulle près du haut */
    @keyframes floatUp {
      0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      6%   { transform: translate(-50%, calc(-50% - 25px)) scale(1); opacity: 1; }
      28%  { transform: translate(calc(-50% + var(--sway, 14px)), calc(-50% - 20vh)) scale(1); opacity: 1; }
      55%  { transform: translate(calc(-50% - var(--sway, 14px)), calc(-50% - 40vh)) scale(1); opacity: 1; }
      82%  { transform: translate(-50%, calc(-50% - 55vh)) scale(1); opacity: 1; }
      89%  { transform: translate(-50%, calc(-50% - 55vh)) scale(1.6); opacity: 0.75; filter: blur(1px); }
      100% { transform: translate(-50%, calc(-50% - 55vh)) scale(2.1); opacity: 0; filter: blur(5px); }
    }
    @keyframes caught {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.9); opacity: 0; }
    }

    /* ── Particules de capture ── */
    .confetti {
      position: fixed;
      pointer-events: none;
      font-size: 0.85rem;
      color: var(--ink);
      z-index: 6;
      will-change: transform, opacity;
      text-shadow: 0 0 6px rgba(232,219,196,0.6);
    }

    /* ── Indice ── */
    .hint {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink2);
      opacity: 1;
      transition: opacity 0.8s ease;
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
    }
    .hint.hidden { opacity: 0; }

    /* ── Fin de partie ── */
    .end-msg {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: rgba(22, 26, 47, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
      z-index: 50;
      text-align: center;
      padding: 2rem;
    }
    .end-msg.show { opacity: 1; pointer-events: all; }
    .end-msg-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.3;
      max-width: 22ch;
    }
    .end-msg-stats {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink2);
    }
    .end-replay {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      border: 1px solid var(--ink3);
      background: transparent;
      padding: 0.85rem 1.7rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .end-replay:hover, .end-replay:active {
      background: rgba(232,219,196,0.1);
      border-color: rgba(232,219,196,0.45);
    }

    /* ── Étoile filante ── */
    .shooting-star {
      position: fixed;
      top: 12%; left: -12%;
      width: 120px; height: 2px;
      background: linear-gradient(to right, transparent, rgba(232,219,196,.85) 70%, #fff);
      border-radius: 2px;
      transform: rotate(20deg);
      pointer-events: none;
      animation: shoot 1.8s ease-out forwards;
      z-index: 40;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
    }
    @keyframes shoot {
      0%   { transform: translate(0, 0) rotate(20deg); opacity: 0; }
      12%  { opacity: 1; }
      100% { transform: translate(140vw, 50vh) rotate(20deg); opacity: 0; }
    }

    @media (max-height: 620px) {
      .collection { top: 3.5rem; }
      .hint { font-size: 0.55rem; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <div class="collection" id="collection" aria-label="Rêves collectés"></div>

  <div class="koala-pos">
    <span class="koala" id="koala" role="button" aria-label="Koala endormi">🐨</span>
  </div>

  <div class="hint" id="hint">attrape les rêves du koala</div>

  <div class="end-msg" id="endMsg" role="dialog" aria-modal="true">
    <p class="end-msg-title">bien vu bg</p>
  </div>

  <script src="/pin-guard.js"></script>
  <script src="/nav.js"></script>
  <script>
    (function () {
      const POOL = [
        { id: 'tiare',    emoji: '🌺' },
        { id: 'palmier',  emoji: '🌴' },
        { id: 'coco',     emoji: '🥥' },
        { id: 'vague',    emoji: '🌊' },
        { id: 'coquille', emoji: '🐚' },
        { id: 'tlb',      text:  'TLB' }
      ];

      const koalaEl = document.getElementById('koala');
      const colEl   = document.getElementById('collection');
      const hintEl  = document.getElementById('hint');
      const endEl   = document.getElementById('endMsg');

      let found      = new Set();
      let live       = [];
      let frozen     = false;
      let stopped    = false;
      let spawnTimer = 0;
      let zzzTimer   = 0;
      let stats      = { caught: 0, missed: 0, shushed: 0 };

      /* ── Position de la tête du koala ── */
      function koalaHead() {
        const rect = koalaEl.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height * 0.18
        };
      }

      /* ── Slots de collection ── */
      function buildCollection() {
        colEl.innerHTML = '';
        POOL.forEach(function (d) {
          const slot = document.createElement('div');
          slot.className = 'col-slot';
          slot.dataset.id = d.id;
          const icon = document.createElement('span');
          icon.className = 'col-icon' + (d.text ? ' col-tlb' : '');
          icon.textContent = d.text || d.emoji;
          slot.appendChild(icon);
          colEl.appendChild(slot);
        });
      }

      function markFound(id) {
        const slot = colEl.querySelector('.col-slot[data-id="' + id + '"]');
        if (slot) slot.classList.add('found');
      }

      /* ── Choix d'un rêve ── */
      function pickDream() {
        const remaining = POOL.filter(function (p) { return !found.has(p.id); });
        if (remaining.length > 0 && Math.random() < 0.78) {
          return remaining[Math.floor(Math.random() * remaining.length)];
        }
        return POOL[Math.floor(Math.random() * POOL.length)];
      }

      /* ── Spawn d'une bulle ── */
      function spawnBubble() {
        if (stopped) return;
        if (frozen) { scheduleNext(); return; }

        const dream = pickDream();
        const head  = koalaHead();
        const startX = head.x + (Math.random() * 30 - 15);
        const startY = head.y;

        const el = document.createElement('div');
        el.className = 'dream';
        el.style.left = startX + 'px';
        el.style.top  = startY + 'px';
        const swayAmp = 8 + Math.random() * 22;
        const swayDir = Math.random() < 0.5 ? -1 : 1;
        el.style.setProperty('--sway', (swayAmp * swayDir) + 'px');

        if (dream.text) {
          const span = document.createElement('span');
          span.className = 'dream-tlb';
          span.textContent = dream.text;
          el.appendChild(span);
        } else {
          el.textContent = dream.emoji;
        }

        const item = { el: el, dream: dream };
        live.push(item);

        el.addEventListener('pointerdown', function (e) {
          e.stopPropagation();
          e.preventDefault();
          onCaught(item);
        }, { passive: false });

        el.addEventListener('animationend', function (e) {
          if (e.animationName === 'floatUp') onMissed(item);
        });

        document.body.appendChild(el);
        scheduleNext();
      }

      function scheduleNext() {
        clearTimeout(spawnTimer);
        if (stopped) return;
        const delay = 2400 + Math.random() * 1500;
        spawnTimer = setTimeout(spawnBubble, delay);
      }

      /* ── Capture ── */
      function onCaught(item) {
        const idx = live.indexOf(item);
        if (idx >= 0) live.splice(idx, 1);

        const isNew = !found.has(item.dream.id);
        if (isNew) {
          found.add(item.dream.id);
          markFound(item.dream.id);
        }
        stats.caught++;

        spawnConfetti(item.el);
        item.el.classList.add('caught');
        setTimeout(function () { item.el.remove(); }, 460);

        hintEl.classList.add('hidden');

        if (found.size === POOL.length) {
          setTimeout(triggerEnd, 950);
        }
      }

      /* ── Raté : éclatement déjà inclus dans floatUp, on nettoie ── */
      function onMissed(item) {
        const idx = live.indexOf(item);
        if (idx >= 0) live.splice(idx, 1);
        stats.missed++;
        item.el.remove();

        koalaEl.classList.remove('turning');
        void koalaEl.offsetWidth;
        koalaEl.classList.add('turning');
        setTimeout(function () { koalaEl.classList.remove('turning'); }, 860);
      }

      /* ── ZZ (sommeil) — drift latéral alterné ── */
      let zzzSide = 1;
      function spawnZzz() {
        clearTimeout(zzzTimer);
        if (stopped || frozen) return;
        const head = koalaHead();
        const z = document.createElement('div');
        z.className = 'zzz';
        z.textContent = '💤';
        zzzSide = -zzzSide;
        const dir = zzzSide + (Math.random() * 0.2 - 0.1); // léger jitter
        z.style.setProperty('--dir', dir);
        // décale légèrement le point de départ du même côté que la trajectoire
        z.style.left = (head.x + 14 * zzzSide + (Math.random() * 10 - 5)) + 'px';
        z.style.top  = (head.y + 4) + 'px';
        document.body.appendChild(z);
        setTimeout(function () { z.remove(); }, 3700);
        zzzTimer = setTimeout(spawnZzz, 1500 + Math.random() * 800);
      }

      /* ── !! (réveil) ── */
      function spawnBangs(count) {
        const head = koalaHead();
        for (let i = 0; i < count; i++) {
          setTimeout(function () {
            const b = document.createElement('div');
            b.className = 'zzz bang';
            b.textContent = '❗';
            b.style.left = (head.x + (Math.random() * 40 - 20)) + 'px';
            b.style.top  = (head.y - 10) + 'px';
            document.body.appendChild(b);
            setTimeout(function () { b.remove(); }, 1600);
          }, i * 130);
        }
      }

      /* ── Chuuut (tap koala) ── */
      function triggerShush() {
        if (frozen || stopped) return;
        frozen = true;
        stats.shushed++;
        document.body.classList.add('frozen');
        clearTimeout(spawnTimer);
        clearTimeout(zzzTimer);

        koalaEl.classList.remove('shushing');
        void koalaEl.offsetWidth;
        koalaEl.classList.add('shushing');

        spawnBangs(3);
        setTimeout(function () { spawnBangs(2); }, 500);

        setTimeout(function () {
          frozen = false;
          document.body.classList.remove('frozen');
          koalaEl.classList.remove('shushing');
          scheduleNext();
          spawnZzz();
        }, 2000);
      }

      koalaEl.addEventListener('pointerdown', function (e) {
        e.stopPropagation();
        e.preventDefault();
        triggerShush();
      }, { passive: false });

      /* ── Confetti ── */
      function spawnConfetti(originEl) {
        const rect = originEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const marks = ['✦', '·', '✧', '·', '✦', '✺'];
        const N = 7;
        for (let i = 0; i < N; i++) {
          const p = document.createElement('div');
          p.className = 'confetti';
          p.textContent = marks[Math.floor(Math.random() * marks.length)];
          p.style.left = cx + 'px';
          p.style.top  = cy + 'px';
          const angle = (Math.PI * 2 * i) / N + Math.random() * 0.4;
          const dist  = 38 + Math.random() * 42;
          const dx = Math.cos(angle) * dist;
          const dy = Math.sin(angle) * dist - 18;
          p.animate([
            { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
            { transform: 'translate(-50%, -50%) translate(' + dx + 'px, ' + dy + 'px) scale(0.4)', opacity: 0 }
          ], { duration: 720, easing: 'cubic-bezier(.2,.7,.4,1)', fill: 'forwards' });
          document.body.appendChild(p);
          setTimeout(function () { p.remove(); }, 740);
        }
      }

      /* ── Fin ── */
      function triggerEnd() {
        stopped = true;
        clearTimeout(spawnTimer);
        clearTimeout(zzzTimer);

        const star = document.createElement('div');
        star.className = 'shooting-star';
        document.body.appendChild(star);
        setTimeout(function () { star.remove(); }, 1900);

        setTimeout(function () { endEl.classList.add('show'); }, 750);
      }

      /* ── Init ── */
      buildCollection();
      setTimeout(spawnBubble, 1400);
      setTimeout(spawnZzz, 700);
      setTimeout(function () { hintEl.classList.add('hidden'); }, 8000);

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          clearTimeout(spawnTimer);
          clearTimeout(zzzTimer);
        } else if (!stopped && !frozen) {
          scheduleNext();
          spawnZzz();
        }
      });
    })();
  </script>
</body>
</html>
