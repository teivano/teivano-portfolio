<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Métros · Rennes — TLB</title>
  <meta name="description" content="Métros de Rennes en temps réel — lignes A et B, position live des rames sur la carte (STAR open data).">
  <meta property="og:title" content="Métros · Rennes — TLB">
  <meta property="og:description" content="Lignes A et B en temps réel · STAR.">
  <meta property="og:image" content="https://teivano.fr/og-image.png">
  <meta property="og:url" content="https://teivano.fr/transports.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Georgia,serif' font-size='52' fill='%236B1A1A' text-anchor='middle'%3ETLB%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
        integrity="sha384-MinO0mNliZ3vwppuPOUnGa+iq619pfMhLVUXfC4LHwSCvF9H+6P/KO4Q7qBOYV5V"
        crossorigin="anonymous"/>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
          integrity="sha384-SYKAG6cglRMN0RVvhNeBY0r3FYKNOJtznwA0v7B5Vp9tr31xAHsZC0DqkQ/pZDmj"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --a:      #F08300;
      --b:      #0065BD;
      --glass:  rgba(255,255,255,.92);
      --gblur:  none;
      --gshadow: 0 2px 12px rgba(0,0,0,.09);
      --r: 18px;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      background: var(--bg);
    }

    /* ── Map ── */
    #map {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── Header ── */
    .t-header {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: .75rem;
      padding: .55rem 1.1rem;
      background: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 0;
      box-shadow: 4px 4px 0 var(--ink);
      white-space: nowrap;
    }
    .t-sep { width: 1px; height: 18px; background: rgba(0,0,0,.12); }
    .t-title {
      font-size: .82rem; font-weight: 700;
      color: rgba(20,10,40,.8);
      letter-spacing: -.01em;
    }
    .t-badge {
      font-size: .65rem; font-weight: 600; letter-spacing: .04em;
      padding: .18rem .55rem; border-radius: 20px;
      color: #fff;
    }
    .t-badge.a { background: var(--a); }
    .t-badge.b { background: var(--b); }

    /* ── Legend / status panel ── */
    .t-panel {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: .55rem;
      padding: .9rem 1.2rem;
      background: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 0;
      box-shadow: 4px 4px 0 var(--ink);
      min-width: 240px; max-width: 92vw;
    }
    .t-panel-row {
      display: flex; align-items: center; gap: .65rem;
    }
    .t-line-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .t-line-label {
      font-size: .72rem; font-weight: 600; color: rgba(20,10,40,.75);
      flex: 1;
    }
    .t-train-count {
      font-size: .7rem; color: rgba(20,10,40,.45);
      background: rgba(0,0,0,.06); border-radius: 20px;
      padding: .1rem .45rem;
    }
    .t-status {
      font-size: .65rem; color: rgba(20,10,40,.45);
      display: flex; align-items: center; gap: .4rem;
    }
    .t-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #10b981; flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .t-status-dot.error { background: #ef4444; animation: none; }
    .t-status-dot.loading { background: #f59e0b; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.75); }
    }

    /* ── Train markers ── */
    .train-marker {
      cursor: pointer;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.35));
      transition: filter .2s;
    }
    .train-marker:hover {
      filter: drop-shadow(0 3px 10px rgba(0,0,0,.5));
    }
    .train-marker svg { display: block; }

    /* ── Station labels (popup) ── */
    .maplibregl-popup-content {
      background: rgba(255,255,255,.95) !important;
      border-radius: 12px !important;
      border: 1px solid rgba(0,0,0,.08) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.15) !important;
      padding: .55rem .85rem !important;
      font-family: system-ui, sans-serif;
      font-size: .72rem; font-weight: 600;
      color: rgba(20,10,40,.8);
    }
    .maplibregl-popup-tip { display: none !important; }
    .maplibregl-popup-close-button { font-size: .85rem; top: 4px; right: 6px; color: rgba(0,0,0,.4); }
    .popup-line { font-size: .62rem; font-weight: 400; color: rgba(20,10,40,.45); margin-top: 2px; }

    /* ── Badge toggles ── */
    .t-badge { cursor: pointer; user-select: none; transition: opacity .2s; }
    .t-badge.off { opacity: .22; }

    /* ── Direction selector ── */
    .t-panel { min-width: 260px; }
    .t-dir-group { display: flex; gap: 2px; }
    .t-dir-opt {
      font-size: .58rem; font-weight: 600; letter-spacing: .04em;
      padding: .17rem .46rem;
      border: 1.5px solid rgba(20,10,40,.18);
      border-radius: 3px; cursor: pointer; background: transparent;
      color: rgba(20,10,40,.38); transition: all .15s;
      font-family: inherit; line-height: 1.4;
    }
    #dir-a-0.active, #dir-a-1.active { background: #F08300; border-color: #F08300; color: #fff; }
    #dir-b-0.active, #dir-b-1.active { background: #0065BD; border-color: #0065BD; color: #fff; }

    @media (max-width: 440px) {
      .t-header { top: .75rem; padding: .45rem .85rem; gap: .5rem; }
      .t-title { font-size: .75rem; }
      .t-panel { bottom: .75rem; padding: .75rem 1rem; min-width: 0; }
    }
  </style>
</head>
<body>

  <!-- Palette -->
  <script>
    (function(){
      var P=[
        {s:'#B8C9E8',b:'#F5F0E8',i:'#6B1A1A',i2:'rgba(107,26,26,.45)'},
        {s:'#A8D5C5',b:'#F2F7F5',i:'#961E50',i2:'rgba(150,30,80,.45)'},
        {s:'#F5C9A8',b:'#FDF8F3',i:'#0A3868',i2:'rgba(10,56,104,.45)'},
        {s:'#C8D4B0',b:'#F5F7EF',i:'#2D0A65',i2:'rgba(45,10,101,.45)'}
      ];
      var p=P[Math.floor(Math.random()*P.length)];
      var r=document.documentElement.style;
      r.setProperty('--stripe',p.s);
      r.setProperty('--bg',p.b);
      r.setProperty('--ink',p.i);
      r.setProperty('--ink2',p.i2);
      document.body.style.background=p.b;
      var svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='72' font-family='Georgia,serif' font-weight='300' font-size='52' fill='"+p.i+"' text-anchor='middle' letter-spacing='-3'>TLB</text></svg>";
      document.getElementById('favicon').href='data:image/svg+xml,'+encodeURIComponent(svg);
    })();
  </script>

  <!-- Stripes (visibles au chargement, couvertes par la carte) -->
  <div class="page-stripes" id="stripes" aria-hidden="true"></div>

  <!-- Map -->
  <div id="map"></div>

  <header class="t-header" role="banner">
    <span class="t-title">Métros · Rennes</span>
    <span class="t-sep"></span>
    <span class="t-badge a" id="badge-a" role="button" tabindex="0" title="Ligne A — cliquer pour afficher/masquer" onclick="toggleLine('a')">A</span>
    <span class="t-badge b off" id="badge-b" role="button" tabindex="0" title="Ligne B — cliquer pour afficher/masquer" onclick="toggleLine('b')">B</span>
  </header>

  <!-- Legend / Status -->
  <aside class="t-panel" aria-label="Légende et statut">
    <div class="t-panel-row" id="panel-row-a">
      <div class="t-line-dot" style="background:#F08300"></div>
      <span class="t-line-label">A</span>
      <div class="t-dir-group">
        <button class="t-dir-opt" id="dir-a-0" onclick="setDir('a',0)">La Poterie</button>
        <button class="t-dir-opt active" id="dir-a-1" onclick="setDir('a',1)">Kennedy</button>
      </div>
      <span class="t-train-count" id="count-a">—</span>
    </div>
    <div class="t-panel-row" id="panel-row-b" style="display:none">
      <div class="t-line-dot" style="background:#0065BD"></div>
      <span class="t-line-label">B</span>
      <div class="t-dir-group">
        <button class="t-dir-opt" id="dir-b-0" onclick="setDir('b',0)">St-Jacques</button>
        <button class="t-dir-opt active" id="dir-b-1" onclick="setDir('b',1)">Cesson</button>
      </div>
      <span class="t-train-count" id="count-b">—</span>
    </div>
    <div class="t-status">
      <div class="t-status-dot loading" id="status-dot"></div>
      <span id="status-txt">Chargement…</span>
    </div>
  </aside>

  <script>
  (function() {
    'use strict';

    var STAR    = 'https://data.explore.star.fr/api/explore/v2.1/catalog/datasets';
    var COLOR_A = '#F08300';
    var COLOR_B = '#0065BD';
    var POLL_MS = 30000;

    // ── State ──
    var lineVisible = { a: true,  b: false };
    var lineDir     = { a: 1,     b: 1    }; // 1=Kennedy (A), 1=Cesson (B) par défaut
    var markers     = {};   // segKey → maplibregl.Marker
    var stationDots = {};   // line → [DOM el]
    var lineStops   = {};
    var liveEvents  = [];   // [{lineKey,idx,departMs,arriveMs,dest}]
    var rafId;
    var lastCountUpdate = 0;
    var map;

    /* ─── Map init ─── */
    map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          carto: {
            type: 'raster',
            tiles: ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                    'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                    'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'],
            tileSize: 256,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>'
          }
        },
        layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
      },
      center: [-1.6778, 48.1173],
      zoom: 13,
      minZoom: 11,
      maxZoom: 18
    });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

    /* ─── Helpers ─── */
    function setStatus(msg, state) {
      document.getElementById('status-txt').textContent = msg;
      var dot = document.getElementById('status-dot');
      dot.className = 't-status-dot' + (state ? ' ' + state : '');
    }

    function isActiveKey(lineKey) {
      var line = lineKey.charAt(0);
      var dir  = parseInt(lineKey.charAt(2), 10);
      return !!lineVisible[line] && lineDir[line] === dir;
    }

    function updateCounts() {
      var now = Date.now();
      var counts = { a: 0, b: 0 };
      var seen   = {};
      liveEvents.forEach(function(e) {
        if (now < e.departMs || now > e.arriveMs) return;
        var seg = e.lineKey + ':' + e.idx;
        if (seen[seg]) return; seen[seg] = true;
        counts[e.lineKey.charAt(0)]++;
      });
      ['a','b'].forEach(function(l) {
        var el = document.getElementById('count-' + l);
        if (el) el.textContent = counts[l] + ' métro' + (counts[l] !== 1 ? 's' : '');
      });
    }

    /* parcours code → sens
       Ligne A : POT=0 → La Poterie,  JFK=1 → Kennedy
       Ligne B : SJG=0 → St-Jacques,  CVI=1 → Cesson  */
    var PARCOURS_SENS = { POT: 0, JFK: 1, SJG: 0, CVI: 1 };

    /* ─── Topology: dessertes (ordre) + stations-td (coords) ─── */
    function fetchTopology() {
      return Promise.all([
        fetch(STAR + '/tco-metro-topologie-dessertes-td/records?limit=100&order_by=ordre').then(function(r){ return r.json(); }),
        fetch(STAR + '/tco-metro-topologie-stations-td/records?limit=100').then(function(r){ return r.json(); })
      ]).then(function(res) {
        var dessertes = res[0]; var stations = res[1];

        /* Coord lookup: nom → {lng, lat} (stations-td uses "nom", dessertes uses "nomarret") */
        var coordsByName = {};
        (stations.results || []).forEach(function(s) {
          if (s.nom && s.coordonnees)
            coordsByName[s.nom] = { lng: s.coordonnees.lon, lat: s.coordonnees.lat };
        });

        /* Group dessertes by parcours code */
        var parcours = {};
        (dessertes.results || []).forEach(function(d) {
          var code = d.libellecourtparcours;
          if (!parcours[code]) parcours[code] = { line: d.nomcourtligne, stops: [] };
          parcours[code].stops.push({ ordre: d.ordre, name: d.nomarret });
        });

        /* Build lineStops using hardcoded PARCOURS_SENS */
        Object.keys(parcours).forEach(function(code) {
          var sens = PARCOURS_SENS[code];
          if (sens === undefined) return;
          var info = parcours[code];
          info.stops.sort(function(a,b){ return a.ordre - b.ordre; });
          var lineKey = info.line + ':' + sens;
          if (lineStops[lineKey]) return;
          lineStops[lineKey] = info.stops.map(function(s) {
            var c = coordsByName[s.name];
            return c ? { name: s.name, lng: c.lng, lat: c.lat } : null;
          }).filter(Boolean);
        });
      });
    }

    /* ─── Draw metro lines on map ─── */
    function drawLines() {
      Object.keys(lineStops).forEach(function(lineKey) {
        var line  = lineKey.charAt(0);
        var stops = lineStops[lineKey];
        if (stops.length < 2) return;
        var color   = line === 'a' ? COLOR_A : COLOR_B;
        var visible = lineVisible[line];
        var vis     = visible ? 'visible' : 'none';
        var srcId = 'src-' + lineKey, layId = 'lay-' + lineKey, caId = 'cas-' + lineKey;
        var geojson = { type:'Feature', geometry:{ type:'LineString', coordinates: stops.map(function(s){ return [s.lng,s.lat]; }) } };
        if (!map.getSource(srcId)) {
          map.addSource(srcId, { type:'geojson', data: geojson });
          map.addLayer({ id: caId, type:'line', source: srcId, layout:{'line-cap':'round','line-join':'round','visibility':vis}, paint:{'line-color':'#fff','line-width':7,'line-opacity':.9} });
          map.addLayer({ id: layId, type:'line', source: srcId, layout:{'line-cap':'round','line-join':'round','visibility':vis}, paint:{'line-color':color,'line-width':4.5} });
        }
        if (!stationDots[line]) stationDots[line] = [];
        stops.forEach(function(s, i) {
          var dotId = 'dot-' + lineKey + '-' + i;
          if (document.getElementById(dotId)) return;
          var el = document.createElement('div'); el.id = dotId;
          el.style.cssText = 'width:10px;height:10px;border-radius:50%;background:#fff;border:3px solid '+color+';box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;' + (visible ? '' : 'display:none');
          var popup = new maplibregl.Popup({ offset:14, closeButton:true })
            .setHTML('<div>'+s.name+'</div><div class="popup-line">Ligne '+line.toUpperCase()+' · '+(i+1)+'/'+stops.length+'</div>');
          new maplibregl.Marker({ element:el, anchor:'center' }).setLngLat([s.lng,s.lat]).setPopup(popup).addTo(map);
          stationDots[line].push(el);
        });
      });
    }

    /* ─── Sync map layers + markers with lineVisible state ─── */
    function updateMapLayers() {
      ['a','b'].forEach(function(line) {
        var vis     = lineVisible[line] ? 'visible' : 'none';
        var display = lineVisible[line] ? '' : 'none';
        [0,1].forEach(function(dir) {
          var lk = line + ':' + dir;
          ['lay-'+lk,'cas-'+lk].forEach(function(id) {
            if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
          });
        });
        (stationDots[line] || []).forEach(function(el) { el.style.display = display; });
      });
      // Retire les marqueurs trains des lignes masquées
      Object.keys(markers).forEach(function(seg) {
        if (!lineVisible[seg.charAt(0)]) { markers[seg].remove(); delete markers[seg]; }
      });
      liveEvents = liveEvents.filter(function(e) { return isActiveKey(e.lineKey); });
      updateCounts();
    }

    /* ─── Live passages — double-anchor interpolation ─── */
    function fetchPassages() {
      // Construit le filtre pour n'interroger que les lignes/sens actifs
      var conditions = [];
      ['a','b'].forEach(function(line) {
        if (!lineVisible[line]) return;
        conditions.push("(nomcourtligne='" + line + "' AND sens=" + lineDir[line] + ")");
      });
      if (!conditions.length) return Promise.resolve();
      var where = encodeURIComponent(conditions.join(' OR '));

      return fetch(STAR + '/tco-metro-circulation-deux-prochains-passages-tr/records?limit=100&where=' + where)
        .then(function(r){ if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
        .then(function(d) {
          var now = Date.now();

          // depMap : 'a:1:Clémenceau' → { times:[t1,t2], dest:'' }
          var depMap = {};
          (d.results || []).forEach(function(p) {
            var lineKey = p.nomcourtligne + ':' + parseInt(p.sens, 10);
            var key     = lineKey + ':' + p.nomarret;
            var times   = [];
            ['departfirsttrain','departsecondtrain'].forEach(function(f) {
              if (p[f]) times.push(new Date(p[f]).getTime());
            });
            depMap[key] = { times: times.sort(function(a,b){ return a-b; }), dest: p.destination || '' };
          });

          // Double-anchor : pour chaque segment A→B, cherche t_A (passé) + t_B (futur)
          var newEvents = [];
          Object.keys(lineStops).forEach(function(lineKey) {
            if (!isActiveKey(lineKey)) return;
            var stops = lineStops[lineKey];
            stops.forEach(function(stop, idx) {
              if (idx >= stops.length - 1) return;
              var dataA = depMap[lineKey + ':' + stop.name];
              var dataB = depMap[lineKey + ':' + stops[idx + 1].name];
              if (!dataA || !dataB) return;
              dataA.times.forEach(function(t_A) {
                if (t_A > now) return; // le train doit être parti de A
                // Premier départ à B postérieur à t_A et encore dans le futur
                var t_B = null;
                dataB.times.forEach(function(t) {
                  if (t > t_A && t > now && (t_B === null || t < t_B)) t_B = t;
                });
                if (!t_B) return;
                var travel = t_B - t_A;
                if (travel < 20000 || travel > 360000) return; // 20s–6min garde-fou
                newEvents.push({ lineKey: lineKey, idx: idx, departMs: t_A, arriveMs: t_B, dest: dataA.dest });
              });
            });
          });

          liveEvents = newEvents;
          updateCounts();
          var ts = new Date();
          setStatus('Mis à jour à ' + ts.getHours() + ':' + String(ts.getMinutes()).padStart(2,'0') + ':' + String(ts.getSeconds()).padStart(2,'0'), '');
        });
    }

    /* ─── Train SVG marker ─── */
    function createTrainEl(line, bearing) {
      var color = line === 'a' ? COLOR_A : COLOR_B;
      var flip  = bearing < 0 ? 'transform:scaleX(-1)' : '';
      var el = document.createElement('div');
      el.className = 'train-marker';
      // Small metro car: body + 3 windows + headlight + bogies
      el.innerHTML =
        '<svg viewBox="0 0 52 22" width="52" height="22" xmlns="http://www.w3.org/2000/svg" style="' + flip + '">'
          // Shadow/glow
          + '<rect x="3" y="5" width="46" height="13" rx="4" fill="rgba(0,0,0,.2)" transform="translate(0,2)"/>'
          // Body
          + '<rect x="1" y="3" width="50" height="14" rx="4.5" fill="' + color + '"/>'
          // Roof highlight
          + '<rect x="3" y="3" width="46" height="5" rx="3.5" fill="rgba(255,255,255,.22)"/>'
          // Windows
          + '<rect x="5"  y="6" width="9" height="7" rx="2" fill="rgba(255,255,255,.8)"/>'
          + '<rect x="17" y="6" width="9" height="7" rx="2" fill="rgba(255,255,255,.8)"/>'
          + '<rect x="29" y="6" width="9" height="7" rx="2" fill="rgba(255,255,255,.8)"/>'
          // Front cab window (right side = front)
          + '<rect x="40" y="5" width="8" height="9" rx="2.5" fill="rgba(255,255,255,.75)"/>'
          // Headlight
          + '<circle cx="49" cy="10" r="2.2" fill="rgba(255,248,180,.95)"/>'
          // Bogies
          + '<rect x="5"  y="16" width="10" height="4" rx="2" fill="rgba(0,0,0,.32)"/>'
          + '<rect x="37" y="16" width="10" height="4" rx="2" fill="rgba(0,0,0,.32)"/>'
          // Line letter badge
          + '<rect x="3" y="3" width="11" height="7" rx="2.5" fill="rgba(0,0,0,.25)"/>'
          + '<text x="8.5" y="9" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5.5" font-weight="800" fill="white">' + line.toUpperCase() + '</text>'
        + '</svg>';
      return el;
    }

    /* ─── Animation loop ─── */
    function animationLoop() {
      var now = Date.now();
      var active = {};

      liveEvents.forEach(function(e) {
        if (now < e.departMs || now > e.arriveMs) return;
        var seg = e.lineKey + ':' + e.idx;
        if (!active[seg] || e.departMs > active[seg].departMs) active[seg] = e;
      });

      Object.keys(active).forEach(function(seg) {
        var e     = active[seg];
        var stops = lineStops[e.lineKey];
        var s0    = stops[e.idx], s1 = stops[e.idx + 1];
        // Interpolation double-anchor : position exacte entre les deux horaires
        var p  = Math.max(0, Math.min(1, (now - e.departMs) / (e.arriveMs - e.departMs)));
        var lng = s0.lng + (s1.lng - s0.lng) * p;
        var lat = s0.lat + (s1.lat - s0.lat) * p;
        var line    = e.lineKey.charAt(0);
        var bearing = Math.atan2(s1.lng - s0.lng, s1.lat - s0.lat) * 180 / Math.PI;

        if (!markers[seg]) {
          var el  = createTrainEl(line, bearing);
          var pop = new maplibregl.Popup({ offset:18, closeButton:false })
            .setHTML('<div>→ '+s1.name+'</div><div class="popup-line">'+e.dest+' · Ligne '+line.toUpperCase()+'</div>');
          markers[seg] = new maplibregl.Marker({ element:el, anchor:'center' })
            .setLngLat([lng,lat]).setPopup(pop).addTo(map);
        } else {
          markers[seg].setLngLat([lng,lat]);
          var pop2 = markers[seg].getPopup();
          if (pop2) pop2.setHTML('<div>→ '+s1.name+'</div><div class="popup-line">'+e.dest+' · Ligne '+line.toUpperCase()+'</div>');
        }
      });

      Object.keys(markers).forEach(function(seg) {
        if (!active[seg]) { markers[seg].remove(); delete markers[seg]; }
      });

      // Refresh des compteurs toutes les 5s (trains qui arrivent à destination)
      if (now - lastCountUpdate > 5000) { updateCounts(); lastCountUpdate = now; }

      rafId = requestAnimationFrame(animationLoop);
    }

    /* ─── Polling ─── */
    function poll() {
      setStatus('Actualisation…', 'loading');
      fetchPassages().catch(function(err) {
        setStatus(err && err.message && err.message.indexOf('429') >= 0
          ? 'Quota API atteint — réessai dans 30s'
          : 'Erreur réseau — réessai dans 30s', 'error');
      });
    }

    /* ─── Toggle ligne A/B ─── */
    window.toggleLine = function(line) {
      lineVisible[line] = !lineVisible[line];
      // Badge
      document.getElementById('badge-' + line).classList.toggle('off', !lineVisible[line]);
      // Rangée panel
      var row = document.getElementById('panel-row-' + line);
      if (row) row.style.display = lineVisible[line] ? '' : 'none';
      // Carte + marqueurs
      updateMapLayers();
      if (lineVisible[line]) poll();
    };

    /* ─── Choix de direction ─── */
    window.setDir = function(line, dir) {
      if (lineDir[line] === dir) return;
      lineDir[line] = dir;
      // Boutons direction
      [0,1].forEach(function(d) {
        var btn = document.getElementById('dir-' + line + '-' + d);
        if (btn) btn.classList.toggle('active', d === dir);
      });
      // Purge marqueurs + événements de cette ligne
      Object.keys(markers).forEach(function(seg) {
        if (seg.charAt(0) === line) { markers[seg].remove(); delete markers[seg]; }
      });
      liveEvents = liveEvents.filter(function(e) { return e.lineKey.charAt(0) !== line; });
      if (lineVisible[line]) poll();
    };

    /* ─── Boot ─── */
    map.on('load', function() {
      setStatus('Chargement topologie…', 'loading');
      fetchTopology()
        .then(function() { drawLines(); poll(); setInterval(poll, POLL_MS); animationLoop(); })
        .catch(function(err) { setStatus('Erreur chargement carte : ' + (err && err.message || 'inconnue'), 'error'); });
    });

  })();
  </script>

  <script>
    // Stripes
    (function(){
      var el=document.getElementById('stripes');
      var N=8;
      for(var i=0;i<N*2-1;i++){
        var s=document.createElement('div');
        var isStripe=i%2===0;
        s.className='page-stripe'+(isStripe?'':' gap');
        if(isStripe){
          s.style.background='var(--stripe)';
          var dur=(0.45+Math.random()*0.55).toFixed(2);
          var del=(Math.floor(i/2)*0.06+Math.random()*0.1).toFixed(2);
          s.style.animation='stripeDrop '+dur+'s cubic-bezier(.16,1,.3,1) '+del+'s both';
        }
        el.appendChild(s);
      }
    })();
  </script>
  <script src="/nav.js"></script>
</body>
